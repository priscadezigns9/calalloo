<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner | Calalloo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=Inter:wght@400;600;800&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FFF8F0;
            --primary: #E87722;
            --text: #1A0D00;
            --white: #FFFFFF;
            --border: rgba(26, 13, 0, 0.05);
            --font-display: 'Fraunces', serif;
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'Space Mono', monospace;
        }

        [data-theme="dark"] {
            --bg: #0A0A0A;
            --text: #FFFFFF;
            --white: #1A1A1A;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            margin: 0;
            padding-bottom: 5rem;
        }

        header {
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--white);
            border-bottom: 1px solid var(--border);
        }

        .nav-brand {
            font-family: var(--font-display);
            font-weight: 900;
            font-size: 1.5rem;
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .scanner-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .scanner-header h1 {
            font-family: var(--font-display);
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .upload-box {
            border: 2px dashed var(--primary);
            padding: 3rem;
            text-align: center;
            border-radius: 12px;
            cursor: pointer;
            background: var(--white);
            transition: all 0.3s ease;
        }

        .upload-icon { font-size: 3rem; margin-bottom: 1rem; display: block; }

        #fileInput { display: none; }

        .loading {
            text-align: center;
            font-family: var(--font-mono);
            color: var(--primary);
            display: none;
            padding: 2rem;
        }

        .results-container { display: none; margin-top: 2rem; }

        .result-card {
            background: var(--white);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .editable-title {
            font-family: var(--font-display);
            font-size: 2rem;
            border: none;
            background: transparent;
            color: var(--text);
            width: 100%;
            font-weight: 900;
            margin-bottom: 1rem;
            border-bottom: 2px solid transparent;
        }
        .editable-title:focus { outline: none; border-bottom: 2px solid var(--primary); }

        .nutrition-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
            background: var(--bg);
            padding: 1.5rem;
            border-radius: 8px;
        }

        .nutri-item span { display: block; font-family: var(--font-mono); font-size: 0.6rem; color: #888; text-transform: uppercase; }
        .nutri-item b { font-size: 1.2rem; color: var(--primary); }

        .btn-post {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 30px;
            font-weight: 800;
            width: 100%;
            cursor: pointer;
            margin-top: 1rem;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--white);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 1rem 0;
            z-index: 1000;
        }

        .nav-item { text-decoration: none; color: #888; font-size: 0.7rem; font-family: var(--font-mono); text-align: center; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { display: block; font-size: 1.5rem; margin-bottom: 0.2rem; }
    </style>
</head>
<body>

    <header>
        <a href="../index.html" class="nav-brand">
            <img src="../assets/logo.svg" alt="Logo" style="height: 32px;">
            Calalloo
        </a>
    </header>

    <div class="container">
        <div class="scanner-header">
            <h1>Specimen Lab.</h1>
            <p>Upload a photo of your heritage specimen for deconstruction.</p>
        </div>

        <div class="upload-box" id="dropZone">
            <span class="upload-icon">📸</span>
            <p>Tap to upload a photo</p>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <div class="loading" id="loading">[ANALYZING_STRUCTURE...]</div>

        <div class="results-container" id="results">
            <div class="result-card">
                <p style="font-size: 0.7rem; font-family: var(--font-mono); color: var(--primary); margin-bottom: 5px;">VERIFY IDENTIFICATION:</p>
                <input type="text" id="resDishName" class="editable-title" value="Analyzing...">
                
                <div class="nutrition-grid">
                    <div class="nutri-item"><span>Calories</span><b id="resCalories">0</b></div>
                    <div class="nutri-item"><span>Protein</span><b id="resProtein">0g</b></div>
                    <div class="nutri-item"><span>Carbs</span><b id="resCarbs">0g</b></div>
                    <div class="nutri-item"><span>Fats</span><b id="resFats">0g</b></div>
                </div>

                <button class="btn-post" onclick="postScan()">Post to My Feed 🧡</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="../dashboard/" class="nav-item"><span class="nav-icon">🏠</span>Feed</a>
        <a href="../scanner/" class="nav-item active"><span class="nav-icon">🔍</span>Scan</a>
        <a href="../profile/" class="nav-item"><span class="nav-icon">👤</span>Profile</a>
    </nav>

    <script src="../js/backend.js"></script>
    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const loading = document.getElementById('loading');
        const results = document.getElementById('results');

        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = async (e) => {
            if (e.target.files.length === 0) return;
            dropZone.style.display = 'none';
            loading.style.display = 'block';

            setTimeout(() => {
                loading.style.display = 'none';
                results.style.display = 'block';
                document.getElementById('resDishName').value = "Preserved Mango Specimen";
                document.getElementById('resCalories').textContent = "120";
                document.getElementById('resProtein').textContent = "1g";
                document.getElementById('resCarbs').textContent = "30g";
                document.getElementById('resFats').textContent = "0g";
            }, 2000);
        };

        function postScan() {
            alert("Specimen posted to your heritage feed!");
            window.location.href = '../dashboard/';
        }
    </script>
</body>
</html>
