<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="300" height="80">
  <defs>
    <!-- Rich Orange Gradient for 3D Depth -->
    <linearGradient id="leaf_top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="leaf_inside" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#9A3412"/>
    </linearGradient>
    <filter id="shadow_3d" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5"/>
      <feOffset dx="1" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 3D Falling Leaf Icon at 45 Degree Angle -->
  <g transform="translate(18, 12) rotate(45, 25, 25)" filter="url(#shadow_3d)">
    <!-- The "Inside" / Folded part of the leaf for 3D effect -->
    <path d="M42,28 C44,38 38,50 28,54 C24,55 22,54 22,52 C22,44 18,36 14,30 C12,26 12,18 16,14 C16,14 30,16 32,30" 
          fill="url(#leaf_inside)" opacity="0.9"/>
    <!-- The main top surface of the leaf -->
    <path d="M22,8 C14,8 8,16 8,26 C8,38 16,48 26,52 C28,53 30,52 30,50 C30,42 34,34 38,28 C40,24 40,18 36,13 C33,10 28,8 22,8 Z" 
          fill="url(#leaf_top)"/>
    <!-- Vein to emphasize 3D contour -->
    <path d="M22,8 Q24,25 26,52" stroke="white" stroke-width="0.8" fill="none" opacity="0.2"/>
  </g>

  <!-- Professional Georgia Typography -->
  <text x="85" y="48" font-family="Georgia, serif" font-weight="900" font-size="42" fill="#F97316" letter-spacing="-1.5">Calalloo</text>
  <text x="86" y="65" font-family="'Plus Jakarta Sans', sans-serif" font-size="9" font-weight="800" fill="rgba(249, 115, 22, 0.6)" letter-spacing="5">INTELLIGENCE HUB</text>
</svg>