<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Calalloo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#FF8C00',
                        dark: '#1A1A1A',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #1A1A1A; color: white; }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center justify-center p-6">
    <div class="w-full max-w-md bg-zinc-900 border border-zinc-800 p-8 rounded-2xl shadow-xl">
        <div class="flex flex-col items-center mb-8">
            <h1 class="text-4xl font-bold text-brand italic">Calalloo</h1>
            <p class="text-zinc-400 mt-2">Sign in to your heritage</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-zinc-400 mb-2">Email Address</label>
                <input type="email" id="email" required class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-brand transition-colors">
            </div>
            <div>
                <label class="block text-sm font-medium text-zinc-400 mb-2">Password</label>
                <input type="password" id="password" required class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-brand transition-colors">
            </div>
            <button type="submit" class="w-full bg-brand hover:bg-orange-600 text-white font-bold py-3 rounded-lg transition-colors shadow-lg">
                Login
            </button>
        </form>

        <div class="mt-8 text-center text-zinc-400">
            Don't have an account? 
            <a href="/signup/" class="text-brand hover:underline">Sign up</a>
        </div>
        
        <div id="message" class="mt-4 text-center text-sm hidden"></div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        const supabase = createClient('https://sktpjacowqaedddtrhuz.supabase.co', '{{credential:supabase-callaloo-dpanyard}}')

        const form = document.getElementById('login-form');
        const message = document.getElementById('message');

        // Check if already logged in
        const { data: { session } } = await supabase.auth.getSession();
        if (session) window.location.href = '/dashboard/';

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            message.classList.remove('hidden', 'text-red-500', 'text-green-500');
            message.innerText = 'Signing in...';

            const { error } = await supabase.auth.signInWithPassword({ email, password });

            if (error) {
                message.innerText = error.message;
                message.classList.add('text-red-500');
            } else {
                message.innerText = 'Login successful! Redirecting...';
                message.classList.add('text-green-500');
                setTimeout(() => window.location.href = '/dashboard/', 1500);
            }
        });
    </script>
</body>
</html>
