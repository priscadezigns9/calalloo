<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Calalloo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=Inter:wght@400;600;800&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0A0A0B;
            --primary: #E87722;
            --text: #FFFFFF;
            --white: #141416;
            --border: rgba(255, 255, 255, 0.05);
            --font-display: 'Fraunces', serif;
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'Space Mono', monospace;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .auth-card {
            background: var(--white);
            padding: 3rem;
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
        }

        .logo-box { text-align: center; margin-bottom: 2rem; }
        .logo-box img { height: 48px; filter: drop-shadow(0 0 10px rgba(232, 119, 34, 0.2)); }

        h1 {
            font-family: var(--font-display);
            font-size: 2.5rem;
            line-height: 1;
            margin-bottom: 1.5rem;
            text-align: center;
            color: var(--primary);
        }

        .form-group { margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.6rem; font-weight: 800; color: #666; text-transform: uppercase; margin-bottom: 0.5rem; font-family: var(--font-mono); }
        input {
            width: 100%;
            border: 1px solid var(--border);
            background: #0A0A0B;
            padding: 1rem;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
            color: white;
        }
        input:focus { outline: 1px solid var(--primary); border-color: var(--primary); }

        .btn-auth {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem;
            font-weight: 800;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        .btn-auth:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(232, 119, 34, 0.3); }

        .auth-footer { margin-top: 2rem; text-align: center; font-size: 0.8rem; color: #666; font-family: var(--font-mono); }
        .auth-footer a { color: var(--primary); text-decoration: none; font-weight: 800; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="logo-box">
            <img src="../assets/logo.png" alt="Logo">
        </div>
        <h1>Welcome Back.</h1>
        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="you@heritage.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-auth">Sign In</button>
        </form>
        <div class="auth-footer">
            New here? <a href="../signup/">Create Account</a><br><br>
            <a href="mailto:priscadezigns9@gmail.com" style="color: #888; font-size: 0.7rem;">Contact Support</a>
        </div>
    </div>
    <script src="../js/backend.js?v=4"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.textContent;
            btn.textContent = "Connecting to Node...";
            btn.disabled = true;
            
            const email = document.getElementById('email').value;
            try {
                await supabase.auth.signIn(email);
                window.location.href = '../dashboard/';
            } catch (err) { 
                alert(err.message || "Login failed."); 
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
