<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uplink | Sign In | Calalloo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,700;9..144,0,900;9..144,1,900&family=Inter:wght@400;600;800&family=Space+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050508;
            --primary: #E87722;
            --dark: #FFFFFF;
            --mid: #8E8E93;
            --white: #0F0F12;
            --border: rgba(255, 255, 255, 0.1);
            --font-display: 'Fraunces', serif;
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'Space Mono', monospace;
            --glow: rgba(232, 119, 34, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg); 
            background-image: radial-gradient(var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            color: var(--dark); 
            font-family: var(--font-sans); 
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            -webkit-font-smoothing: antialiased; 
        }

        .auth-card {
            background: rgba(15, 15, 18, 0.9);
            backdrop-filter: blur(25px) saturate(180%);
            padding: 4rem;
            width: 100%;
            max-width: 480px;
            border-radius: 40px;
            border: 1px solid var(--border);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
            position: relative;
        }

        .auth-card::before {
            content: "SECURE_UPLINK";
            position: absolute;
            top: 2rem;
            right: 3rem;
            font-family: var(--font-mono);
            font-size: 0.55rem;
            color: #00FF9D;
            letter-spacing: 0.2em;
        }

        .logo-box { text-align: center; margin-bottom: 3rem; }
        .logo-box img { height: 42px; }

        h1 {
            font-family: var(--font-display);
            font-size: 3rem;
            line-height: 0.9;
            margin-bottom: 2rem;
            text-align: center;
            font-weight: 900;
            letter-spacing: -0.05em;
        }
        h1 span { color: var(--primary); }

        .form-group { margin-bottom: 2rem; }
        label { display: block; font-size: 0.65rem; font-weight: 800; color: var(--mid); text-transform: uppercase; margin-bottom: 0.8rem; font-family: var(--font-mono); letter-spacing: 0.1em; }
        input {
            width: 100%;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.03);
            padding: 1.2rem;
            border-radius: 12px;
            box-sizing: border-box;
            font-family: var(--font-mono);
            color: white;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        input:focus { outline: none; border-color: var(--primary); background: rgba(232, 119, 34, 0.05); }

        .btn-auth {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 1.2rem;
            font-weight: 800;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-family: var(--font-mono);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 10px 20px var(--glow);
        }
        .btn-auth:hover { transform: translateY(-3px); box-shadow: 0 15px 30px var(--glow); }

        .auth-footer { margin-top: 3rem; text-align: center; font-size: 0.7rem; color: var(--mid); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.1em; }
        .auth-footer a { color: var(--primary); text-decoration: none; font-weight: 800; }
        .auth-footer a:hover { border-bottom: 1px solid var(--primary); }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="logo-box">
            <a href="../index.html"><img src="../assets/logo.png" alt="Calalloo"></a>
        </div>
        <h1>Neural <span>Uplink</span>.</h1>
        <form id="loginForm">
            <div class="form-group">
                <label>Node Identity (Email)</label>
                <input type="email" id="email" placeholder="ident_0x@heritage.lab" required>
            </div>
            <div class="form-group">
                <label>Security Vector (Password)</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn-auth">Initialize Connection</button>
        </form>
        <div class="auth-footer">
            No active node? <a href="../signup/">Register Uplink</a>
        </div>
    </div>

    <script src="../js/backend.js?v=6"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = e.target.querySelector('button');
            
            btn.textContent = "Verifying Neural Hash...";
            btn.disabled = true;

            try {
                const result = await window.backend.signIn(email, password);
                if (result.success) {
                    btn.textContent = "Uplink Secure. Redirecting...";
                    setTimeout(() => window.location.href = '../dashboard/', 1000);
                } else {
                    alert('Neural Mismatch: ' + result.error);
                    btn.textContent = "Initialize Connection";
                    btn.disabled = false;
                }
            } catch (err) {
                console.error(err);
                btn.textContent = "System Error. Retry.";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
