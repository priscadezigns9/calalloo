<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sign In | Calalloo</title>
    <link rel="icon" type="image/png" href="https://drive.google.com/uc?export=view&id=1MOdc4fha-Guqo1X3Y8l9JdlBuMdDuuzB">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,700;9..144,0,900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
        function togglePasswordVisibility() {
            const p = document.getElementById('password');
            const icon = document.getElementById('togglePassword');
            if (p.type === 'password') {
                p.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                p.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }
    
    </script>
    <style>
        :root { --primary: #E87722; --dark: #000; --bg: #FFFFFF; --font-display: 'Fraunces', serif; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--dark); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
        .auth-card { background: white; width: 100%; max-width: 450px; padding: 40px; border-radius: 40px; border: 1px solid #f0f0f0; box-shadow: 0 20px 50px rgba(0,0,0,0.05); text-align: center; }
        @media (max-width: 480px) { .auth-card { padding: 32px 24px; border: none; box-shadow: none; } }
        .brand-logo { height: 60px; margin-bottom: 32px; }
        h1 { font-family: var(--font-display); font-size: 32px; margin-bottom: 12px; font-weight: 900; }
        p { color: #666; font-size: 14px; margin-bottom: 32px; font-weight: 500; }
        .form-group { margin-bottom: 24px; text-align: left; }
        label { display: block; font-size: 11px; font-weight: 900; text-transform: uppercase; color: var(--primary); margin-bottom: 10px; letter-spacing: 1px; }
        input { width: 100%; padding: 18px 20px; border-radius: 18px; border: 2px solid #F2F2F2; background: #FAF9F6; font-weight: 600; outline: none; transition: 0.3s; font-size: 16px; appearance: none; }
        input:focus { border-color: var(--primary); background: white; }
        .btn-auth { background: var(--primary); color: white; border: none; padding: 20px; border-radius: 100px; width: 100%; font-weight: 900; font-size: 16px; cursor: pointer; margin-top: 12px; transition: 0.3s; box-shadow: 0 10px 20px rgba(232, 119, 34, 0.15); }
        .btn-auth:active { transform: scale(0.98); opacity: 0.9; }
        .footer-link { margin-top: 32px; font-size: 14px; font-weight: 600; color: #666; }
        .footer-link a { color: var(--primary); text-decoration: none; font-weight: 900; }
        #error-msg { color: #d00; font-size: 13px; margin-top: 20px; font-weight: 700; min-height: 1.2em; }
    </style>
</head>
<body>
    <div class="auth-card">
        <img src="/assets/logo.png" class="brand-logo" alt="Calalloo">
        <h1>Welcome Back</h1>
        <p>Sign in to access your Heritage Kitchen.</p>
        
        <form onsubmit="event.preventDefault(); signIn();">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" autocomplete="email" placeholder="name@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn-auth">Sign In</button>
        </form>
        <div id="error-msg"></div>

        <div class="footer-link">
            Not a member? <a href="/signup/">Create Account</a>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://sktpjacowqaedddtrhuz.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ChdrHQEJV7pVpJMKt-ZaUw_6V0WRKAR';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function signIn() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.querySelector('.btn-auth');
            const err = document.getElementById('error-msg');
            
            btn.innerText = "Signing In...";
            err.innerText = "";
            btn.disabled = true;

            try {
                const { data, error } = await sb.auth.signInWithPassword({ email, password });
                
                if (error) {
                    err.innerText = error.message;
                    btn.innerText = "Sign In";
                    btn.disabled = false;
                } else {
                    btn.innerText = "Success!";
                    btn.style.background = "#2D5A27";
                    setTimeout(() => { window.location.href = '/dashboard/'; }, 1000);
                }
            } catch (e) {
                err.innerText = "An unexpected error occurred.";
                btn.innerText = "Sign In";
                btn.disabled = false;
            }
        }
    
        function togglePasswordVisibility() {
            const p = document.getElementById('password');
            const icon = document.getElementById('togglePassword');
            if (p.type === 'password') {
                p.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                p.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }
    
    </script>
</body>
</html>
