<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Calalloo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=Inter:wght@400;600;800&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FFF8F0;
            --primary: #E87722;
            --text: #1A0D00;
            --white: #FFFFFF;
            --border: rgba(26, 13, 0, 0.1);
            --font-display: 'Fraunces', serif;
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'Space Mono', monospace;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .auth-card {
            background: var(--white);
            padding: 3rem;
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(26, 13, 0, 0.05);
        }

        .logo-box { text-align: center; margin-bottom: 2rem; }
        .logo-box img { height: 48px; }

        h1 {
            font-family: var(--font-display);
            font-size: 2.5rem;
            line-height: 1;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .form-group { margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.7rem; font-weight: 800; color: #888; text-transform: uppercase; margin-bottom: 0.5rem; }
        input {
            width: 100%;
            border: 1px solid var(--border);
            padding: 1rem;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
        }

        .btn-auth {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem;
            font-weight: 800;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
        }

        .auth-footer { margin-top: 2rem; text-align: center; font-size: 0.9rem; }
        .auth-footer a { color: var(--primary); text-decoration: none; font-weight: 800; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="logo-box">
            <img src="../assets/logo.svg" alt="Logo">
        </div>
        <h1>Welcome Back.</h1>
        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="you@heritage.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-auth">Sign In</button>
        </form>
        <div class="auth-footer">
            New here? <a href="../signup/">Create Account</a><br><br>
            <a href="mailto:priscadezigns9@gmail.com" style="color: #888; font-size: 0.7rem;">Contact Support</a>
        </div>
    </div>
    <script src="../js/backend.js?v=4"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            try {
                await supabase.auth.signIn(email);
                window.location.href = '../dashboard/';
            } catch (err) { alert(err.message || "Login failed."); }
        });
    </script>
</body>
</html>
