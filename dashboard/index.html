<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calalloo | Heritage Hub v29.0 Gold Standard</title>
    <link rel="icon" type="image/png" href="../assets/logo.png">
    <link rel="manifest" href="/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,700;9..144,0,900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #FFFFFF; --primary: #E87722; --dark: #000000; --white: #FFFFFF;
            --border: #F2F2F2; --grey-text: #666666; --light-bg: #FAF9F6;
            --font-display: 'Fraunces', serif; --font-main: 'Inter', sans-serif;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg: #0A0A0A; --white: #0A0A0A; --dark: #FFFFFF;
            --border: #1F1F1F; --grey-text: #A0A0A0; --light-bg: #141414;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: var(--font-main); background: var(--bg); color: var(--dark); overflow-x: hidden; transition: var(--transition); }
        
        #loader-overlay { 
            position: fixed; inset: 0; background: var(--bg); z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: opacity 0.5s ease;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        header { position: sticky; top: 0; background: var(--bg); border-bottom: 1px solid var(--border); padding: 15px 20px; z-index: 1000; display: flex; align-items: center; justify-content: space-between; transition: var(--transition); }
        .logo-container { display: flex; align-items: center; gap: 10px; }
        .logo-container img { width: 32px; height: 32px; border-radius: 50%; }
        .logo-container span { font-family: var(--font-display); font-weight: 900; font-size: 1.4rem; letter-spacing: -0.02em; }

        /* Pinterest Masonry Layout */
        .pinterest-grid { 
            columns: 4; column-gap: 20px; padding: 20px;
            max-width: 1400px; margin: 0 auto;
        }

        .recipe-pin { 
            break-inside: avoid; margin-bottom: 20px; border-radius: 16px; 
            overflow: hidden; background: var(--light-bg); border: 1px solid var(--border);
            cursor: pointer; transition: transform 0.2s;
        }
        .recipe-pin:hover { transform: translateY(-5px); }
        .recipe-pin img { width: 100%; display: block; background: #eee; }
        .pin-info { padding: 12px; }
        .pin-info h3 { font-size: 0.95rem; font-weight: 700; color: var(--dark); margin-bottom: 4px; }
        .pin-info p { font-size: 0.75rem; color: var(--grey-text); }

        /* Discovery Hub Scroll Layout */
        .discovery-scroll-container { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .discovery-scroll-container::-webkit-scrollbar { display: none; }

        .keeper-pill { flex: 0 0 80px; text-align: center; cursor: pointer; transition: var(--transition); }
        .keeper-avatar { width: 64px; height: 64px; border-radius: 50%; border: 2px solid var(--primary); padding: 2px; object-fit: cover; }

        /* AI Camera FAB */
        .ai-camera-fab { 
            position: fixed; bottom: 100px; right: 25px; 
            width: 65px; height: 65px; border-radius: 50%; 
            background: var(--primary); color: white; border: none;
            box-shadow: 0 8px 24px rgba(232, 119, 34, 0.4);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 2000; transition: var(--transition);
        }
        .ai-camera-fab:active { transform: scale(0.9); }

        /* Vision Scanner Overlay */
        #vision-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000;
            display: none; flex-direction: column; align-items: center; justify-content: center; color: white;
        }
        .scanner-line { width: 80%; height: 2px; background: var(--primary); position: absolute; top: 0; left: 10%; box-shadow: 0 0 15px var(--primary); animation: scan 2s linear infinite; }
        @keyframes scan { from { top: 20%; } to { top: 80%; } }

        /* Responsive */
        @media (max-width: 1024px) { .pinterest-grid { columns: 3; } }
        @media (max-width: 768px) { 
            .pinterest-grid { columns: 2; column-gap: 12px; padding: 12px; }
            .ai-camera-fab { bottom: 90px; right: 20px; width: 55px; height: 55px; }
        }

        .tab-content { padding-bottom: 100px; display: none; }
        nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; height: 75px; padding-bottom: 15px; z-index: 1000; }
        .nav-item { color: var(--grey-text); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <div id="loader-overlay">
        <div class="spinner"></div>
        <p style="margin-top: 15px; font-weight: 700; color: var(--primary);" id="t-loading">Calalloo Hub v29.0...</p>
    </div>

    <!-- AI Scanner Interface -->
    <div id="vision-overlay">
        <div style="position:relative; width:300px; height:300px; border:2px solid rgba(255,255,255,0.3); border-radius:24px;">
            <div class="scanner-line"></div>
            <img id="preview-image" style="width:100%; height:100%; object-fit:cover; border-radius:24px; display:none;">
        </div>
        <h2 class="display-font" style="margin-top:30px;" id="scan-status">Consulting Zapia...</h2>
        <p style="opacity:0.7; font-size:0.9rem;" id="scan-sub">Analyzing heritage signals & syncing map</p>
        <button onclick="closeScanner()" style="margin-top:40px; background:none; border:1px solid white; color:white; padding:10px 25px; border-radius:12px; cursor:pointer;">Cancel</button>
    </div>

    <header>
        <div class="logo-container">
            <img src="../assets/logo.png" alt="Calalloo">
            <span id="t-brand">Calalloo</span>
        </div>
        <div class="desktop-nav">
            <div class="nav-link active" onclick="showTab('discovery')">Discovery</div>
            <div class="nav-link" onclick="showTab('map')">Map</div>
            <div class="nav-link" onclick="showTab('settings')">Settings</div>
            <button onclick="signOut()" style="background:var(--primary); color:white; border:none; padding:8px 16px; border-radius:10px; font-weight:700; cursor:pointer;">Sign Out</button>
        </div>
    </header>

    <!-- PINTEREST STYLE DISCOVERY -->
    <div id="discovery" class="tab-content" style="display:block;">
        <div class="search-container">
            <div class="search-bar">
                <i data-lucide="search"></i>
                <input type="text" placeholder="Search heritage..." id="s-input">
            </div>
        </div>

        <div class="section-title" style="padding: 0 20px;" id="t-discovery-title">Discover Dishes</div>
        <div class="pinterest-grid" id="recipe-pins">
            <!-- Pins will be injected here -->
        </div>
    </div>

    <!-- SETTINGS -->
    <div id="settings" class="tab-content">
        <div style="padding: 20px;">
            <h2 class="display-font" style="margin-bottom: 25px;">Settings</h2>
            <div class="settings-section">
                <h3 style="color:var(--primary); margin-bottom:15px;">Language</h3>
                <div style="display:flex; gap:10px;">
                    <button class="btn-primary" onclick="setLanguage('en')">English</button>
                    <button class="btn-primary" onclick="setLanguage('es')">Español</button>
                    <button class="btn-primary" onclick="setLanguage('pt')">Português</button>
                </div>
            </div>
        </div>
    </div>

    <button class="ai-camera-fab" onclick="triggerCamera()">
        <i data-lucide="camera" style="width:30px; height:30px;"></i>
    </button>

    <nav>
        <div class="nav-item active" onclick="showTab('discovery')"><i data-lucide="compass"></i></div>
        <div class="nav-item" onclick="showTab('map')"><i data-lucide="map"></i></div>
        <div class="nav-item" onclick="triggerCamera()"><i data-lucide="scan"></i></div>
        <div class="nav-item" onclick="showTab('settings')"><i data-lucide="settings"></i></div>
    </nav>

    <script>
        const sb = supabase.createClient('https://sktpjacowqaedddtrhuz.supabase.co', 'sb_publishable_ChdrHQEJV7pVpJMKt-ZaUw_6V0WRKAR');
        let currentUserId = null, recipes = [];

        async function init() {
            const { data: { session } } = await sb.auth.getSession();
            if(!session) { window.location.href = '/login/'; return; }
            currentUserId = session.user.id;
            
            loadData();
            lucide.createIcons();
            document.getElementById('loader-overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('loader-overlay').style.display = 'none', 500);
        }

        async function loadData() {
            const { data } = await sb.from('recipes').select('*').eq('is_published', true).order('created_at', { ascending: false });
            recipes = data || [];
            renderPins();
        }

        function renderPins() {
            const grid = document.getElementById('recipe-pins');
            grid.innerHTML = recipes.map(r => `
                <div class="recipe-pin">
                    <img src="${r.cover_photo_url || 'https://via.placeholder.com/400x600?text=No+Image'}" alt="${r.title}">
                    <div class="pin-info">
                        <h3>${r.title}</h3>
                        <p>Heritage Recipe</p>
                    </div>
                </div>
            `).join('');
        }

        function triggerCamera() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.capture = 'environment';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if(file) {
                    document.getElementById('vision-overlay').style.display = 'flex';
                    const reader = new FileReader();
                    reader.onload = (re) => {
                        document.getElementById('preview-image').src = re.target.result;
                        document.getElementById('preview-image').style.display = 'block';
                        // Simulate Sync to Zapia
                        setTimeout(() => {
                            document.getElementById('scan-status').innerText = "Signal Synced!";
                            document.getElementById('scan-sub').innerText = "Zapia is identifying & updating your map...";
                            setTimeout(() => closeScanner(), 2500);
                        }, 3000);
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        }

        function closeScanner() { 
            document.getElementById('vision-overlay').style.display = 'none'; 
            document.getElementById('scan-status').innerText = "Consulting Zapia...";
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        init();
    </script>
</body>
</html>
