<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calalloo | Heritage Hub</title>
    <link rel="icon" type="image/png" href="/assets/logo.png">
    <link rel="manifest" href="/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,700;9..144,0,900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #FFFFFF; --primary: #E87722; --dark: #000000; --white: #FFFFFF;
            --border: #F2F2F2; --grey-text: #666666; --light-bg: #FAF9F6;
            --font-display: 'Fraunces', serif; --font-main: 'Inter', sans-serif;
        }
        [data-theme="dark"] {
            --bg: #0A0A0A; --dark: #FFFFFF; --white: #1A1A1A;
            --border: #2A2A2A; --grey-text: #AAAAAA; --light-bg: #111111;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: var(--font-main); background: var(--bg); color: var(--dark); overflow-x: hidden; transition: background 0.3s, color 0.3s; }
        
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 1000; }
        .logo-box { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo-box img { width: 32px; height: 32px; border-radius: 6px; }
        .display-font { font-family: var(--font-display); font-weight: 900; letter-spacing: -0.5px; }

        .nav-pills { display: flex; gap: 5px; background: var(--light-bg); padding: 5px; border-radius: 100px; }
        .pill { padding: 8px 16px; border-radius: 100px; font-size: 0.9rem; font-weight: 600; cursor: pointer; color: var(--grey-text); transition: all 0.2s; }
        .pill.active { background: var(--white); color: var(--dark); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

        .app-container { display: flex; max-width: 1440px; margin: 0 auto; min-height: calc(100vh - 63px); }
        .sidebar { width: 300px; padding: 20px; border-right: 1px solid var(--border); position: sticky; top: 63px; height: calc(100vh - 63px); overflow-y: auto; }
        .main-content { flex: 1; min-width: 0; position: relative; }
        
        @media (max-width: 1100px) { .sidebar { display: none; } }
        @media (max-width: 900px) { .nav-pills { display: none; } }

        .hamburger-btn { display: none; cursor: pointer; z-index: 2000; position: relative; padding: 5px; }
        @media (max-width: 1100px) { .hamburger-btn { display: block; } }

        .tab-content { display: none; padding-bottom: 80px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Reels UI */
        .reels-container { position: relative; height: calc(100vh - 63px); overflow-y: scroll; scroll-snap-type: y mandatory; background: #000; }
        .reel-video-box { position: relative; width: 100%; height: 100%; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; background: #000; overflow: hidden; }
        .reel-video { width: 100%; height: 100%; object-fit: cover; }
        .reel-overlay { position: absolute; inset: 0; background: linear-gradient(transparent 70%, rgba(0,0,0,0.7)); padding: 20px; display: flex; flex-direction: column; justify-content: flex-end; color: white; }
        .reel-actions { position: absolute; right: 15px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .action-btn { background: none; border: none; color: white; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 0.8rem; }
        .action-btn i { width: 32px; height: 32px; }

        /* Discovery & Other UI */
        .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; padding: 20px; }
        .recipe-card { border-radius: 12px; overflow: hidden; cursor: pointer; background: var(--white); border: 1px solid var(--border); }
        .recipe-image { height: 180px; background-size: cover; background-position: center; }
        .recipe-info { padding: 12px; }

        .search-bar { padding: 20px; position: sticky; top: 0; background: var(--bg); z-index: 900; }
        .search-input { width: 100%; padding: 14px 16px; border: 1.5px solid var(--border); border-radius: 12px; outline: none; }

        .btn { padding: 14px 24px; border-radius: 12px; font-weight: 700; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.2s; justify-content: center; }
        .btn-primary { background: var(--primary); color: white; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: flex-end; justify-content: center; z-index: 3000; }
        .modal-content { background: var(--bg); color: var(--dark); width: 100%; max-width: 600px; border-radius: 24px 24px 0 0; padding: 25px; max-height: 95vh; overflow-y: auto; }
        
        .messenger-bubble { position: fixed; bottom: 30px; right: 30px; background: var(--primary); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 15px rgba(232,119,34,0.4); z-index: 2000; }
        .messenger-bubble img { width: 35px; height: 35px; filter: brightness(0) invert(1); }

        .user-card { background: var(--white); border: 1px solid var(--border); border-radius: 16px; padding: 20px; text-align: center; cursor: pointer; }
        .user-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 20px; }
    </style>
</head>
<body>
    <header>
        <div class="logo-box" onclick="showTab('discovery')"><img src="https://priscadezigns9.github.io/calalloo/assets/logo.png" alt="Calalloo"><span class="display-font">Calalloo</span></div>
        <div class="nav-pills">
            <div class="pill active" onclick="showTab('discovery')">Discovery</div>
            <div class="pill" onclick="showTab('reels')">Reels</div>
            <div class="pill" onclick="showTab('profile')">Profile</div>
            <div class="pill" onclick="showTab('settings')">Settings</div>
        </div>
        <div class="header-actions">
            <div class="hamburger-btn" onclick="toggleMenu()"><i data-lucide="menu" style="width: 28px; height: 28px;"></i></div>
        </div>
    </header>

    <div class="app-container">
        <aside class="sidebar">
            <div class="section-header" style="font-weight: 800; margin-bottom: 20px;"><i data-lucide="users"></i> Groups</div>
            <div id="sidebar-groups"><p style="opacity: 0.5;">No groups yet</p></div>
        </aside>

        <main class="main-content">
            <div id="discovery" class="tab-content active">
                <div class="search-bar"><input type="text" class="search-input" placeholder="Search recipes or keepers..." oninput="handleUnifiedSearch(this.value)"></div>
                <div id="user-results" style="display:none;"><div id="user-results-grid" class="user-grid"></div></div>
                <div id="discovery-grid" class="recipe-grid"></div>
            </div>

            <div id="reels" class="tab-content" style="padding:0;">
                <div id="reels-container" class="reels-container">
                    <!-- Reels loaded dynamically -->
                </div>
            </div>

            <div id="profile" class="tab-content">
                <div style="padding: 40px 20px; text-align: center; border-bottom: 1px solid var(--border);">
                    <div style="width: 100px; height: 100px; margin: 0 auto 20px; position: relative;">
                        <img id="p-avatar" style="width:100%; height:100%; border-radius:50%; object-fit:cover; border:3px solid var(--primary); background: var(--light-bg);">
                        <input type="file" id="avatar-input" style="display:none;" onchange="uploadAvatar(this)">
                        <button onclick="document.getElementById('avatar-input').click()" style="position:absolute; bottom:0; right:0; background:var(--primary); color:white; border:none; border-radius:50%; width:30px; height:30px;"><i data-lucide="camera" style="width:16px;"></i></button>
                    </div>
                    <div style="display:flex; flex-direction:column; gap:10px; max-width:400px; margin:0 auto;">
                        <input type="text" id="p-fullname" placeholder="Profile Name (e.g. Maria S.)" style="width:100%; padding:12px; border-radius:12px; border:1px solid var(--border); font-weight:700;">
                        <input type="text" id="p-username" placeholder="Username (e.g. @maria_heritage)" style="width:100%; padding:12px; border-radius:12px; border:1px solid var(--border);">
                        <textarea id="p-bio" placeholder="Bio..." style="width:100%; padding:12px; border-radius:12px; border:1px solid var(--border); min-height:80px;"></textarea>
                        <button class="btn btn-primary" onclick="saveFullProfile()">Update Heritage Identity</button>
                    </div>
                </div>
                <div id="profile-kitchen" class="recipe-grid"></div>
            </div>

            <div id="settings" class="tab-content">
                <div style="padding: 40px 20px;">
                    <h1 class="display-font">Settings</h1>
                    <div style="margin-top:20px;"><button class="btn btn-secondary" onclick="signOut()" style="color:red;">Sign Out</button></div>
                </div>
            </div>
        </main>
    </div>

    <div class="messenger-bubble" onclick="openHub()"><img src="https://priscadezigns9.github.io/calalloo/assets/logo.png" alt="Messenger"></div>

    <script>
        const sb = supabase.createClient('https://sktpjacowqaedddtrhuz.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNrdHBqYWNvd3FhZWRkZHRyaHV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NDk5MzEsImV4cCI6MjA5NDIyNTkzMX0.FK4N_ATFTaUuGXrYu_7OBn3qCdlo0rOzxk-E6TxJxqs');
        let currentUserId = null;

        async function loadData() {
            const { data: { user } } = await sb.auth.getUser();
            if(!user) { window.location.href = '/login/'; return; }
            currentUserId = user.id;

            // Load Profile from Supabase Auth Metadata (for names) + Profiles Table (for bio)
            const profileName = user.user_metadata.full_name || '';
            const userName = user.user_metadata.username || '';
            document.getElementById('p-fullname').value = profileName;
            document.getElementById('p-username').value = userName;

            const { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single();
            if(profile) {
                document.getElementById('p-bio').value = profile.bio || '';
                document.getElementById('p-avatar').src = profile.avatar_url || 'https://via.placeholder.com/100?text=HP';
            }

            loadRecipes();
            loadReels();
            lucide.createIcons();
        }

        async function saveFullProfile() {
            const fullName = document.getElementById('p-fullname').value;
            const username = document.getElementById('p-username').value;
            const bio = document.getElementById('p-bio').value;

            // Update Auth Metadata (User Identity)
            await sb.auth.updateUser({
                data: { full_name: fullName, username: username }
            });

            // Update Profiles Table (Social Data)
            const { error } = await sb.from('profiles').upsert({
                id: currentUserId,
                bio: bio,
                updated_at: new Date()
            });

            if(!error) alert('Identity and Social Profile synced to Supabase!');
        }

        async function loadReels() {
            // Mock reels for now - in production these come from a 'reels' table
            const mockReels = [
                { url: 'https://assets.mixkit.co/videos/preview/mixkit-cooking-a-fresh-vegetable-soup-41315-large.mp4', user: '@chef_caribbean', likes: '1.2k' },
                { url: 'https://assets.mixkit.co/videos/preview/mixkit-putting-fresh-vegetables-in-a-pan-41312-large.mp4', user: '@island_eats', likes: '800' }
            ];
            
            const container = document.getElementById('reels-container');
            container.innerHTML = mockReels.map(reel => `
                <div class="reel-video-box">
                    <video class="reel-video" src="${reel.url}" loop autoplay muted playsinline></video>
                    <div class="reel-overlay">
                        <h3>${reel.user}</h3>
                        <p>Traditional heritage secrets. #calalloo</p>
                    </div>
                    <div class="reel-actions">
                        <button class="action-btn"><i data-lucide="heart"></i><span>${reel.likes}</span></button>
                        <button class="action-btn"><i data-lucide="message-circle"></i><span>24</span></button>
                        <button class="action-btn"><i data-lucide="share-2"></i></button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function handleUnifiedSearch(q) {
            if(q.length < 2) { document.getElementById('user-results').style.display='none'; return; }
            // Filter by full name or username via RPC or ilike
            const { data: users } = await sb.from('profiles').select('*').ilike('bio', `%${q}%`).limit(5);
            if(users) {
                document.getElementById('user-results').style.display='block';
                document.getElementById('user-results-grid').innerHTML = users.map(u => `
                    <div class="user-card">
                        <img src="${u.avatar_url || 'https://via.placeholder.com/60?text=HP'}" style="width:60px; height:60px; border-radius:50%;">
                        <h4>Heritage Keeper</h4>
                    </div>
                `).join('');
            }
        }

        async function loadRecipes() {
            const { data: recipes } = await sb.from('recipes').select('*').eq('is_published', true).limit(20);
            document.getElementById('discovery-grid').innerHTML = (recipes || []).map(r => `
                <div class="recipe-card">
                    <div class="recipe-image" style="background-image: url(${r.cover_photo_url})"></div>
                    <div class="recipe-info"><h3>${r.title}</h3></div>
                </div>
            `).join('');
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll(`.pill[onclick*="${id}"]`).forEach(p => p.classList.add('active'));
            if(id !== 'reels') {
                document.querySelectorAll('video').forEach(v => v.pause());
            }
        }

        function signOut() { sb.auth.signOut().then(() => window.location.href = '/login/'); }
        window.onload = loadData;
    </script>
</body>
</html>
