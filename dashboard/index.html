<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Kitchen | Calalloo</title>
    <link rel="icon" type="image/png" href="/assets/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #E87722; 
            --white: #FFFFFF; 
            --bg: #FFF5EE; 
            --dark: #1A0D00;
            --border: rgba(232, 119, 34, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--dark); overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        header { background: var(--white); border-bottom: 1px solid var(--border); padding: 15px 40px; display: flex; align-items: center; justify-content: space-between; z-index: 100; }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo img { height: 40px; }
        
        .nav-pills { display: flex; gap: 8px; background: #FDE8D7; padding: 5px; border-radius: 50px; }
        .pill { padding: 10px 20px; border-radius: 40px; cursor: pointer; font-weight: 700; font-size: 12px; color: #666; transition: 0.3s; display: flex; align-items: center; gap: 6px; }
        .pill.active { background: var(--white); color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .container { flex: 1; overflow-y: auto; padding: 30px; max-width: 1000px; margin: 0 auto; width: 100%; }
        .view { display: none; min-height: 100%; }
        .view.active { display: block; }

        .card { background: var(--white); border-radius: 25px; padding: 30px; box-shadow: 0 8px 30px rgba(0,0,0,0.03); border: 1px solid var(--border); margin-bottom: 20px; }
        
        h2 { font-family: 'Fraunces', serif; margin-bottom: 24px; color: var(--primary); }

        .btn { padding: 15px 30px; border-radius: 50px; font-weight: 800; cursor: pointer; border: none; font-size: 14px; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-logout { color: #888; font-weight: 700; background: transparent; border: none; cursor: pointer; }

        .empty-state { text-align: center; padding: 80px 20px; color: #888; font-weight: 700; }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo"><img src="/assets/logo.png" alt="Calalloo Logo"></a>
        
        <div class="nav-pills">
            <div class="pill active" onclick="switchView('feed', this)"><i data-lucide="layout-grid"></i> Feed</div>
            <div class="pill" onclick="switchView('profile', this)"><i data-lucide="user"></i> Profile</div>
            <div class="pill" onclick="switchView('settings', this)"><i data-lucide="settings"></i> Settings</div>
        </div>

        <button class="btn-logout" onclick="signOut()">Sign Out</button>
    </header>

    <div class="container">
        <div id="feed" class="view active">
            <h2>Heritage Feed</h2>
            <div class="card">
                <div class="empty-state">No recipes found in your history. Start exploring!</div>
            </div>
        </div>

        <div id="profile" class="view">
            <h2>My Profile</h2>
            <div class="card">
                <p id="userEmail">Loading...</p>
            </div>
        </div>

        <div id="settings" class="view">
            <h2>Settings</h2>
            <div class="card">
                <p>Personalize your experience.</p>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://sktpjacowqaedddtrhuz.supabase.co';
        const SUPABASE_KEY = '{credential:supabase-callaloo-dpanyard}';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        lucide.createIcons();

        function switchView(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        async function loadUser() {
            const { data: { user } } = await sb.auth.getUser();
            if (!user) {
                window.location.href = '/login/';
                return;
            }
            document.getElementById('userEmail').innerText = "Logged in as: " + user.email;
        }

        async function signOut() {
            await sb.auth.signOut();
            localStorage.removeItem('calalloo_uid');
            window.location.href = '/';
        }

        loadUser();
    </script>
</body>
</html>
