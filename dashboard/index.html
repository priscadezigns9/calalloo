<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
    <title>Dashboard — Calalloo Intelligence</title>
    <link href='https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap' rel='stylesheet'>
    <style>
        :root{--primary:#F97316;--dark:#050505;--surface:#111;--border:rgba(255,255,255,0.05)}
        body{background:var(--dark);color:white;font-family:'Plus Jakarta Sans',sans-serif;display:flex;height:100vh}
        .sidebar{width:260px;background:var(--surface);border-right:1px solid var(--border);padding:40px}
        .main{flex:1;padding:60px;overflow-y:auto}
    </style>
</head>
<body>
    <div class='sidebar'>
        <h2 style='color:var(--primary)'>🥘 Calalloo</h2>
        <p style='margin-top:30px;color:rgba(255,255,255,0.4)'>Beta User 1/10</p>
    </div>
    <div class='main'>
        <h1>Kitchen Intelligence Feed</h1>
        <div style='background:var(--surface);padding:40px;border-radius:24px;margin-top:40px;border:1px solid var(--border)'>
            <p>Scanning Neural Nodes... System Active.</p>
        </div>
    </div>
</body>
</html>
