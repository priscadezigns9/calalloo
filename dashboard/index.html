<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calalloo | Heritage Hub v35.0 Sovereign Pro</title>
    <link rel="icon" type="image/png" href="../assets/logo.png">
    <link rel="manifest" href="/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,700;9..144,0,900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #FFFFFF; --primary: #E87722; --dark: #000000; --white: #FFFFFF;
            --border: #F2F2F2; --grey-text: #666666; --light-bg: #FAF9F6;
            --font-display: 'Fraunces', serif; --font-main: 'Inter', sans-serif;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        [data-theme="dark"] {
            --bg: #0A0A0A; --white: #0A0A0A; --dark: #FFFFFF;
            --border: #1F1F1F; --grey-text: #A0A0A0; --light-bg: #141414;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: var(--font-main); background: var(--bg); color: var(--dark); transition: var(--transition); min-height: 100vh; overflow-x: hidden; }
        
        /* Mobile Header */
        header { position: sticky; top: 0; background: var(--bg); border-bottom: 1px solid var(--border); padding: 12px 20px; z-index: 1000; display: flex; align-items: center; justify-content: space-between; }
        .logo-container { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo-container img { width: 32px; height: 32px; border-radius: 50%; }
        .logo-container span { font-family: var(--font-display); font-weight: 900; font-size: 1.3rem; letter-spacing: -0.02em; }
        .pro-badge { background: linear-gradient(135deg, #FFD700, #E87722); color: white; font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; font-weight: 900; margin-left: 6px; cursor: pointer; }

        /* Desktop Tabs - Hidden on Mobile */
        .desktop-tabs { display: flex; gap: 25px; margin-left: 30px; }
        .tab-btn { font-weight: 700; font-size: 0.85rem; color: var(--grey-text); cursor: pointer; transition: 0.2s; white-space: nowrap; }
        .tab-btn.active { color: var(--primary); }

        /* Pinterest Grid Responsive */
        .pinterest-grid { columns: 4; column-gap: 15px; padding: 15px; max-width: 1400px; margin: 0 auto; }
        .recipe-pin { break-inside: avoid; margin-bottom: 15px; border-radius: 16px; overflow: hidden; background: var(--light-bg); border: 1px solid var(--border); cursor: pointer; transition: var(--transition); position: relative; }
        .recipe-pin img { width: 100%; height: 300px; display: block; object-fit: cover; }
        .pin-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,0.8)); opacity: 0; transition: 0.3s; display: flex; flex-direction: column; justify-content: flex-end; padding: 12px; color: white; }
        .recipe-pin:hover .pin-overlay { opacity: 1; }

        /* Settings Card */
        .settings-card { background: var(--light-bg); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.7rem; font-weight: 800; color: var(--grey-text); text-transform: uppercase; margin-bottom: 8px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--dark); font-family: inherit; }

        /* Navigation */
        nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; height: 75px; z-index: 1000; padding-bottom: 10px; }
        .nav-item { color: var(--grey-text); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 0.6rem; font-weight: 700; transition: 0.2s; }
        .nav-item.active { color: var(--primary); }

        /* Modals */
        .modal { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: none; flex-direction: column; overflow-y: auto; }
        .modal-header { position: sticky; top: 0; background: var(--bg); padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }

        @media (max-width: 768px) {
            .desktop-tabs { display: none; }
            .pinterest-grid { columns: 2; column-gap: 10px; padding: 10px; }
            .recipe-pin img { height: 240px; }
        }
        
        .tab-content { display: none; padding-bottom: 80px; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container" onclick="showTab('discovery')">
            <img src="../assets/logo.png" alt="Calalloo">
            <span>Calalloo<span class="pro-badge" onclick="openModal('pro-modal')">PRO</span></span>
        </div>
        <div class="desktop-tabs">
            <div class="tab-btn active" id="d-tab-discovery" onclick="showTab('discovery')">Discovery</div>
            <div class="tab-btn" id="d-tab-map" onclick="showTab('map')">Map</div>
            <div class="tab-btn" id="d-tab-kitchen" onclick="showTab('kitchen')">Kitchen</div>
            <div class="tab-btn" id="d-tab-settings" onclick="showTab('settings')">Settings</div>
        </div>
        <i data-lucide="plus-circle" style="color:var(--primary); cursor:pointer;" onclick="alert('Submission engine coming soon...')"></i>
    </header>

    <div id="discovery" class="tab-content" style="display:block;">
        <div class="pinterest-grid" id="discovery-pins"></div>
    </div>

    <div id="map" class="tab-content">
        <div style="height:calc(100vh - 150px); display:flex; flex-direction:column; align-items:center; justify-content:center;">
            <i data-lucide="map" style="width:40px; color:var(--primary);"></i>
            <p style="font-weight:700; margin-top:10px;">Heritage Map</p>
        </div>
    </div>

    <div id="kitchen" class="tab-content">
        <div style="padding:20px;">
            <h2 class="display-font">My Kitchen</h2>
            <div class="pinterest-grid" id="kitchen-pins" style="padding:10px 0;"></div>
        </div>
    </div>

    <div id="settings" class="tab-content">
        <div style="padding:20px; max-width:600px; margin: 0 auto;">
            <h2 class="display-font" style="margin-bottom:20px;">Settings</h2>
            <div class="settings-card">
                <div class="form-group"><label>Full Name</label><input type="text" id="s-name" value="Prisca Dezigns"></div>
                <div class="form-group"><label>Language</label>
                    <select><option>English</option><option>Español</option><option>Português</option></select>
                </div>
                <button onclick="alert('Settings Saved!')" style="width:100%; padding:14px; background:var(--primary); color:white; border:none; border-radius:12px; font-weight:700; cursor:pointer;">Save Changes</button>
            </div>
            <button onclick="alert('Signed Out')" style="color:red; background:none; border:none; width:100%; font-weight:700;">Sign Out</button>
        </div>
    </div>

    <!-- Modals -->
    <div id="detail-modal" class="modal">
        <div class="modal-header"><i data-lucide="arrow-left" onclick="closeModal('detail-modal')"></i><h3 class="display-font">Recipe</h3><div></div></div>
        <img id="m-img" style="width:100%; height:40vh; object-fit:cover;">
        <div style="padding:25px;"><h1 class="display-font" id="m-title"></h1><p id="m-content" style="margin-top:20px; line-height:1.6; white-space:pre-wrap;"></p></div>
    </div>

    <div id="pro-modal" class="modal">
        <div class="modal-header"><h2>Calalloo PRO</h2><i data-lucide="x" onclick="closeModal('pro-modal')"></i></div>
        <div style="padding:40px; text-align:center; background:#000; color:white; margin:20px; border-radius:24px;">
            <h1>Upgrade</h1><p style="margin:20px 0; opacity:0.7;">Get all features</p><h2>$9.99/mo</h2>
            <button onclick="alert('Pay')" style="margin-top:30px; width:100%; padding:15px; background:white; color:black; border:none; border-radius:12px; font-weight:900;">Pay Now</button>
        </div>
    </div>

    <nav>
        <div class="nav-item active" id="nav-discovery" onclick="showTab('discovery')"><i data-lucide="compass"></i>Discovery</div>
        <div class="nav-item" id="nav-map" onclick="showTab('map')"><i data-lucide="map"></i>Map</div>
        <div class="nav-item" id="nav-scan" onclick="alert('Camera Scan active...')"><i data-lucide="scan"></i>Scan</div>
        <div class="nav-item" id="nav-kitchen" onclick="showTab('kitchen')"><i data-lucide="user"></i>Kitchen</div>
        <div class="nav-item" id="nav-settings" onclick="showTab('settings')"><i data-lucide="settings"></i>Settings</div>
    </nav>

    <script>
        const sb = supabase.createClient('https://sktpjacowqaedddtrhuz.supabase.co', 'sb_publishable_ChdrHQEJV7pVpJMKt-ZaUw_6V0WRKAR');
        let recipes = [];

        async function init() {
            lucide.createIcons();
            loadDiscovery();
            if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
        }

        async function loadDiscovery() {
            const { data } = await sb.from('recipes').select('*').order('created_at', {ascending:false});
            recipes = data || [];
            renderPins('discovery-pins', recipes);
        }

        function renderPins(id, items) {
            const grid = document.getElementById(id);
            if(!grid) return;
            grid.innerHTML = items.map(r => `
                <div class="recipe-pin" onclick="openRecipe('${r.id}')">
                    <img src="${r.cover_photo_url || ''}">
                    <div class="pin-overlay"><h3>${r.title}</h3></div>
                </div>
            `).join('');
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(id).style.display = 'block';
            document.getElementById('nav-'+id).classList.add('active');
            const desk = document.getElementById('d-tab-'+id);
            if(desk) desk.classList.add('active');
        }

        function openRecipe(id) {
            const r = recipes.find(item => item.id === id);
            if(!r) return;
            document.getElementById('m-img').src = r.cover_photo_url;
            document.getElementById('m-title').innerText = r.title;
            document.getElementById('m-content').innerText = (r.ingredients || "") + "\n\n" + (r.instructions || "");
            openModal('detail-modal');
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        init();
    </script>
</body>
</html>
