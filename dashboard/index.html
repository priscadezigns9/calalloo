<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Feed | Calalloo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,700;9..144,0,900;9..144,1,900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #FFF8F0;
            --primary: #E87722;
            --dark: #1A0D00;
            --mid: #6B5E4F;
            --white: #FFFFFF;
            --border: rgba(232, 119, 34, 0.1);
            --font-display: 'Fraunces', serif;
            --font-sans: 'Inter', sans-serif;
        }

        [data-theme="dark"] {
            --bg: #0A0A0B;
            --dark: #FFFFFF;
            --mid: #A1A1A6;
            --white: #141416;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg); 
            color: var(--dark); 
            font-family: var(--font-sans); 
            line-height: 1.6; 
            padding-bottom: 100px;
            transition: background 0.3s;
        }

        header { 
            padding: 1rem 1.5rem; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: var(--white);
            border-bottom: 1px solid var(--border);
            position: sticky; 
            top: 0; 
            z-index: 1000;
        }

        .nav-brand { 
            font-family: var(--font-display); 
            font-weight: 900; 
            font-size: 1.4rem; 
            color: var(--primary); 
            text-decoration: none; 
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .nav-brand span::after { 
            content: ""; 
            width: 6px; 
            height: 6px; 
            background: #000; 
            border-radius: 50%; 
            display: inline-block; 
            margin-top: 10px; 
            transition: background 0.3s;
        }
        [data-theme="dark"] .nav-brand span::after { background: #fff; }

        .header-actions { display: flex; align-items: center; gap: 1.2rem; }
        
        .search-bar {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 0.5rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
            width: 250px;
        }
        .search-bar input { border: none; background: none; outline: none; font-size: 0.85rem; width: 100%; color: var(--dark); }
        
        .theme-switch {
            width: 50px;
            height: 26px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 100px;
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 2px;
            transition: all 0.3s;
        }
        .theme-switch .circle {
            width: 20px; height: 20px; background: var(--primary); border-radius: 50%;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        [data-theme="dark"] .theme-switch .circle { transform: translateX(22px); background: #fff; }
        .theme-switch svg { width: 12px; height: 12px; fill: none; stroke: currentColor; stroke-width: 3; display: none; }
        
        /* Modern icon logic */
        [data-theme="light"] .theme-switch .sun { display: block; color: white; }
        [data-theme="dark"] .theme-switch .moon { display: block; color: var(--primary); }

        .logo-small { height: 36px; width: 36px; border-radius: 50%; border: 1px solid var(--border); object-fit: cover; }

        .container { max-width: 600px; margin: 2.5rem auto; padding: 0 1rem; }

        /* Discovery Filter */
        .discovery-filter { 
            display: flex; 
            gap: 1rem; 
            margin-bottom: 2rem; 
            overflow-x: auto; 
            padding-bottom: 0.8rem;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .discovery-filter::-webkit-scrollbar { display: none; }

        .filter-chip { 
            padding: 0.6rem 1.4rem; background: var(--white); border: 1px solid var(--border); 
            border-radius: 100px; font-size: 0.8rem; font-weight: 800; color: var(--mid); 
            white-space: nowrap; cursor: pointer; transition: all 0.2s;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .filter-chip.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 12px rgba(232,119,34,0.2); }

        /* Single-Column Feed (Facebook/Social Style) */
        .feed-grid { 
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .feed-card { 
            background: var(--white);
            border-radius: 28px;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: transform 0.3s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        }

        .card-header {
            padding: 1rem 1.2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-img { width: 100%; display: block; aspect-ratio: 4/5; object-fit: cover; }
        
        .card-content { padding: 1.2rem; }
        .card-title { font-family: var(--font-display); font-weight: 900; font-size: 1.3rem; margin-bottom: 0.8rem; line-height: 1.2; }
        
        .card-footer {
            padding: 0 1.2rem 1.2rem;
            display: flex;
            gap: 1.5rem;
            border-top: 1px solid var(--border);
            padding-top: 1rem;
        }

        .interaction-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--mid);
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: color 0.2s;
        }
        .interaction-btn:hover { color: var(--primary); }
        .interaction-btn svg { width: 20px; height: 20px; }
        .interaction-btn.active { color: var(--primary); }

        .card-user { display: flex; align-items: center; gap: 10px; font-size: 0.85rem; font-weight: 700; color: var(--dark); }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--bg); border: 1px solid var(--border); }

        /* Modern Bottom Nav */
        .bottom-nav { 
            position: fixed; 
            bottom: 1.5rem; 
            left: 50%; 
            transform: translateX(-50%); 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(20px); 
            padding: 0.8rem 2rem; 
            border-radius: 100px; 
            display: flex; 
            gap: 3rem; 
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(232, 119, 34, 0.15);
            z-index: 2000;
        }
        [data-theme="dark"] .bottom-nav { background: rgba(20, 20, 22, 0.9); }

        .nav-item { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-decoration: none; 
            color: var(--mid);
            transition: all 0.3s;
        }
        .nav-item.active { color: var(--primary); }
        .nav-item svg { width: 24px; height: 24px; margin-bottom: 4px; }
        .nav-item span { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; }

        .theme-switch { cursor: pointer; color: var(--mid); }
    </style>
</head>
<body>

    <header>
        <a href="../index.html" class="nav-brand"><span>Calalloo</span></a>
        
        <div class="search-bar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="color: var(--mid)"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" id="searchInput" placeholder="Discover Heritage...">
        </div>

        <div class="header-actions">
            <div class="theme-switch" onclick="ThemeManager.toggle()" title="Toggle Theme">
                <div class="circle">
                    <svg class="sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    <svg class="moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </div>
            </div>
            <a href="../profile/"><img src="../assets/logo.png" id="headerAvatar" class="logo-small" alt="Lab Logo"></a>
        </div>
    </header>

    <main class="container">
        <div class="discovery-filter">
            <div class="filter-chip active" onclick="filterFeed('all')">All Recipes</div>
            <div class="filter-chip" onclick="filterFeed('Sweets')">Sweets</div>
            <div class="filter-chip" onclick="filterFeed('Pastries')">Pastries</div>
            <div class="filter-chip" onclick="filterFeed('Provisions')">Provisions</div>
            <div class="filter-chip" onclick="filterFeed('Street Food')">Street Food</div>
            <div class="filter-chip" onclick="filterFeed('Trending')">Trending</div>
        </div>
        <div class="feed-grid" id="feedGrid">
            <!-- Dynamic Heritage Nodes Injected via script -->
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
            <span>Feed</span>
        </a>
        <a href="../scan/" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
            <span>Scan</span>
        </a>
        <a href="../profile/" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span>Profile</span>
        </a>
    </nav>

    <script src="../js/backend.js"></script>
    <script>
        ThemeManager.init();
        
        const searchInput = document.getElementById('searchInput');
        const feedGrid = document.getElementById('feedGrid');
        
        const heritageNodes = [
            {"title": "Trinidadian Callaloo Protocol", "category": "Provisions", "img": "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?q=80&w=1000&auto=format&fit=crop", "user": "Heritage Lab"},
            {"title": "Oil Down Tradition", "category": "Street Food", "img": "https://images.unsplash.com/photo-1547592166-23ac45744acd?q=80&w=1000&auto=format&fit=crop", "user": "Grenada Node"},
            {"title": "Pelau Matrix", "category": "Trending", "img": "https://images.unsplash.com/photo-1604382354936-07c5d9983bd3?q=80&w=1000&auto=format&fit=crop", "user": "Trinidad Node"},
            {"title": "Ackee and Saltfish Node", "category": "For You", "img": "https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=1000&auto=format&fit=crop", "user": "Jamaica Node"},
            {"title": "Cou-Cou and Flying Fish", "category": "Provisions", "img": "https://images.unsplash.com/photo-1511690656952-34342bb7c2f2?q=80&w=1000&auto=format&fit=crop", "user": "Barbados Node"},
            {"title": "Buss-up-Shut Roti", "category": "Street Food", "img": "https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?q=80&w=1000&auto=format&fit=crop", "user": "Guyana Node"},
            {"title": "Coconut Sugar Cake", "category": "Sweets", "img": "https://images.unsplash.com/photo-1551024601-bec78aea704b?q=80&w=1000&auto=format&fit=crop", "user": "Heritage Lab"},
            {"title": "Currants Roll Protocol", "category": "Pastries", "img": "https://images.unsplash.com/photo-1509440159596-0249088772ff?q=80&w=1000&auto=format&fit=crop", "user": "Pastry Node"},
            {"title": "Black Cake Essence", "category": "Sweets", "img": "https://images.unsplash.com/photo-1578985545062-69928b1d9587?q=80&w=1000&auto=format&fit=crop", "user": "Heritage Lab"},
            {"title": "Tamarind Balls Core", "category": "Sweets", "img": "https://images.unsplash.com/photo-1621939514649-280e2ee25f60?q=80&w=1000&auto=format&fit=crop", "user": "Street Food Node"}
        ];

        const fullCatalog = [];
        for(let i=0; i<205; i++) {
            const base = heritageNodes[i % heritageNodes.length];
            fullCatalog.push({...base, title: `${base.title} Vol.${Math.floor(i/heritageNodes.length) + 1}`});
        }

        function renderFeed(filter = 'all', term = '') {
            feedGrid.innerHTML = '';
            fullCatalog.forEach((node, index) => {
                const matchesFilter = filter === 'all' || node.category === filter;
                const matchesSearch = node.title.toLowerCase().includes(term.toLowerCase());
                
                if(matchesFilter && matchesSearch) {
                    const card = document.createElement('div');
                    card.className = 'feed-card';
                    card.innerHTML = `
                        <div class="card-header">
                            <div class="card-user">
                                <div class="user-avatar"></div>
                                <span>${node.user}</span>
                            </div>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--mid)" stroke-width="2"><circle cx="12" cy="12" r="1"></circle><circle cx="19" cy="12" r="1"></circle><circle cx="5" cy="12" r="1"></circle></svg>
                        </div>
                        <img src="${node.img}" class="card-img" alt="${node.title}">
                        <div class="card-content">
                            <div class="card-title">${node.title}</div>
                        </div>
                        <div class="card-footer">
                            <div class="interaction-btn" onclick="this.classList.toggle('active')">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                                <span>React</span>
                            </div>
                            <div class="interaction-btn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                                <span>Note</span>
                            </div>
                            <div class="interaction-btn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                                <span>Share</span>
                            </div>
                        </div>
                    `;
                    feedGrid.appendChild(card);
                }
            });
        }

        function filterFeed(category) {
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            renderFeed(category, searchInput.value);
        }

        searchInput.addEventListener('input', (e) => {
            const activeChip = document.querySelector('.filter-chip.active');
            const categoryText = activeChip ? activeChip.innerText : 'all';
            const category = categoryText === 'All Recipes' ? 'all' : categoryText;
            renderFeed(category, e.target.value);
        });

        renderFeed();
        if(typeof supabase !== 'undefined') supabase.auth.loadProfile();
    </script>
</body>
</html>
