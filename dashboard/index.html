<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Feed | Calalloo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,700;9..144,0,900;9..144,1,900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #FFF8F0;
            --primary: #E87722;
            --dark: #1A0D00;
            --mid: #6B5E4F;
            --white: #FFFFFF;
            --border: rgba(232, 119, 34, 0.1);
            --font-display: 'Fraunces', serif;
            --font-sans: 'Inter', sans-serif;
        }

        [data-theme="dark"] {
            --bg: #0A0A0B;
            --dark: #FFFFFF;
            --mid: #A1A1A6;
            --white: #141416;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg); 
            color: var(--dark); 
            font-family: var(--font-sans); 
            line-height: 1.6; 
            padding-bottom: 100px;
            transition: background 0.3s;
        }

        header { 
            padding: 1rem 1.5rem; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: var(--white);
            border-bottom: 1px solid var(--border);
            position: sticky; 
            top: 0; 
            z-index: 1000;
        }

        .nav-brand { 
            font-family: var(--font-display); 
            font-weight: 900; 
            font-size: 1.4rem; 
            color: var(--primary); 
            text-decoration: none; 
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .nav-brand span::after { content: ""; width: 6px; height: 6px; background: #000; border-radius: 50%; display: inline-block; margin-top: 10px; }
        [data-theme="dark"] .nav-brand span::after { background: #fff; }

        .header-actions { display: flex; align-items: center; gap: 1.2rem; }
        
        .search-bar {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 0.5rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
            width: 250px;
        }
        .search-bar input { border: none; background: none; outline: none; font-size: 0.85rem; width: 100%; color: var(--dark); }
        
        .theme-switch {
            width: 50px;
            height: 26px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 100px;
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 2px;
        }
        .theme-switch .circle {
            width: 20px; height: 20px; background: var(--primary); border-radius: 50%;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center;
        }
        [data-theme="dark"] .theme-switch .circle { transform: translateX(22px); }
        .theme-switch svg { width: 10px; height: 10px; fill: white; color: white; }

        .logo-small { height: 36px; width: 36px; border-radius: 50%; border: 1px solid var(--border); object-fit: cover; }

        .container { max-width: 1200px; margin: 2.5rem auto; padding: 0 1rem; }

        /* Discovery Filter */
        .discovery-filter { display: flex; gap: 1rem; margin-bottom: 2rem; overflow-x: auto; padding-bottom: 0.5rem; }
        .filter-chip { 
            padding: 0.6rem 1.2rem; background: var(--white); border: 1px solid var(--border); 
            border-radius: 100px; font-size: 0.8rem; font-weight: 700; color: var(--mid); 
            white-space: nowrap; cursor: pointer; transition: all 0.2s;
        }
        .filter-chip.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* Pinterest-Style Grid */
        .feed-grid { 
            column-count: 2; 
            column-gap: 1.5rem; 
        }
        @media (min-width: 768px) { .feed-grid { column-count: 3; } }
        @media (min-width: 1024px) { .feed-grid { column-count: 4; } }

        .feed-card { 
            background: var(--white);
            border-radius: 24px;
            margin-bottom: 1.5rem;
            break-inside: avoid;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        .feed-card:hover { transform: scale(1.02); border-color: var(--primary); }

        .card-img { width: 100%; display: block; border-radius: 24px 24px 0 0; }
        .card-content { padding: 1rem; }
        .card-title { font-family: var(--font-display); font-weight: 900; font-size: 1.1rem; margin-bottom: 0.5rem; }
        .card-user { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: var(--mid); }
        .user-avatar { width: 24px; height: 24px; border-radius: 50%; background: #eee; }

        /* Modern Bottom Nav */
        .bottom-nav { 
            position: fixed; 
            bottom: 1.5rem; 
            left: 50%; 
            transform: translateX(-50%); 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(20px); 
            padding: 0.8rem 2rem; 
            border-radius: 100px; 
            display: flex; 
            gap: 3rem; 
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(232, 119, 34, 0.15);
            z-index: 2000;
        }
        [data-theme="dark"] .bottom-nav { background: rgba(20, 20, 22, 0.9); }

        .nav-item { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-decoration: none; 
            color: var(--mid);
            transition: all 0.3s;
        }
        .nav-item.active { color: var(--primary); }
        .nav-item svg { width: 24px; height: 24px; margin-bottom: 4px; }
        .nav-item span { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; }

        .theme-switch { cursor: pointer; color: var(--mid); }
    </style>
</head>
<body>

    <header>
        <a href="../index.html" class="nav-brand"><span>Calalloo</span></a>
        
        <div class="search-bar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="color: var(--mid)"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" placeholder="Discover Heritage...">
        </div>

        <div class="header-actions">
            <div class="theme-switch" onclick="ThemeManager.toggle()" title="Toggle Theme">
                <div class="circle">
                    <svg class="sun" viewBox="0 0 24 24" style="display: var(--sun-display)"><path d="M12 7a5 5 0 100 10 5 5 0 000-10zM2 13h2a1 1 0 100-2H2a1 1 0 100 2zm18 0h2a1 1 0 100-2h-2a1 1 0 100 2zM11 2v2a1 1 0 102 0V2a1 1 0 10-2 0zm0 18v2a1 1 0 102 0v-2a1 1 0 10-2 0zM5.99 4.58a1 1 0 10-1.41 1.41l1.41 1.41a1 1 0 101.41-1.41L5.99 4.58zm12.02 12.02a1 1 0 10-1.41 1.41l1.41 1.41a1 1 0 101.41-1.41l-1.41-1.41zm-1.41-12.02a1 1 0 101.41 1.41l1.41-1.41a1 1 0 10-1.41-1.41l-1.41 1.41zM4.58 16.59l-1.41 1.41a1 1 0 101.41 1.41l1.41-1.41a1 1 0 10-1.41-1.41z"/></svg>
                    <svg class="moon" viewBox="0 0 24 24" style="display: var(--moon-display)"><path d="M21.64 13a1 1 0 00-1.05-.14 8.05 8.05 0 01-3.37.73 8.15 8.15 0 01-8.14-8.14 8.59 8.59 0 01.25-2 1 1 0 00-1.21-1.08 10.14 10.14 0 1012.72 10.78 1 1 0 00-.2-1.15z"/></svg>
                </div>
            </div>
            <a href="../profile/"><img src="../assets/logo.png" id="headerAvatar" class="logo-small" alt="Lab Logo"></a>
        </div>
    </header>

    <main class="container">
        <div class="discovery-filter">
            <div class="filter-chip active">All Recipes</div>
            <div class="filter-chip">For You</div>
            <div class="filter-chip">Trending</div>
            <div class="filter-chip">Provisions</div>
            <div class="filter-chip">Street Food</div>
        </div>
        <div class="feed-grid">
            <!-- Mock items for visual demo -->
            <div class="feed-card">
                <img src="../assets/heritage/callaloo.jpg" class="card-img" alt="Callaloo">
                <div class="card-content">
                    <div class="card-title">Authentic Callaloo Protocol</div>
                    <div class="card-user"><div class="user-avatar"></div><span>Heritage Lab</span></div>
                </div>
            </div>
            <div class="feed-card">
                <img src="../assets/heritage/coconut.jpg" class="card-img" alt="Coconut">
                <div class="card-content">
                    <div class="card-title">Fresh Extraction Nodes</div>
                    <div class="card-user"><div class="user-avatar"></div><span>Sourcing Dept.</span></div>
                </div>
            </div>
            <div class="feed-card">
                <img src="../assets/heritage/pelau.jpg" class="card-img" alt="Pelau">
                <div class="card-content">
                    <div class="card-title">The Perfect Pelau</div>
                    <div class="card-user"><div class="user-avatar"></div><span>Admin</span></div>
                </div>
            </div>
            <div class="feed-card">
                <img src="../assets/heritage/oil-down.jpg" class="card-img" alt="Oil Down">
                <div class="card-content">
                    <div class="card-title">Oil Down Traditions</div>
                    <div class="card-user"><div class="user-avatar"></div><span>Heritage Lab</span></div>
                </div>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
            <span>Feed</span>
        </a>
        <a href="../scan/" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
            <span>Scan</span>
        </a>
        <a href="../profile/" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span>Profile</span>
        </a>
    </nav>

    <script src="../js/backend.js"></script>
    <script>ThemeManager.init();</script>
</body>
</html>
