<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calalloo | Heritage Hub v30.0 Platinum</title>
    <link rel="icon" type="image/png" href="../assets/logo.png">
    <link rel="manifest" href="/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,700;9..144,0,900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #FFFFFF; --primary: #E87722; --dark: #000000; --white: #FFFFFF;
            --border: #F2F2F2; --grey-text: #666666; --light-bg: #FAF9F6;
            --font-display: 'Fraunces', serif; --font-main: 'Inter', sans-serif;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --card-shadow: 0 4px 12px rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --bg: #0A0A0A; --white: #0A0A0A; --dark: #FFFFFF;
            --border: #1F1F1F; --grey-text: #A0A0A0; --light-bg: #141414;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: var(--font-main); background: var(--bg); color: var(--dark); transition: var(--transition); }
        
        /* Layout */
        header { position: sticky; top: 0; background: var(--bg); border-bottom: 1px solid var(--border); padding: 12px 20px; z-index: 1000; display: flex; align-items: center; justify-content: space-between; }
        .logo-container { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo-container img { width: 32px; height: 32px; border-radius: 50%; }
        .logo-container span { font-family: var(--font-display); font-weight: 900; font-size: 1.4rem; letter-spacing: -0.02em; }

        .desktop-tabs { display: flex; gap: 30px; margin-left: 40px; flex: 1; }
        .tab-btn { font-weight: 700; font-size: 0.9rem; color: var(--grey-text); cursor: pointer; position: relative; transition: var(--transition); }
        .tab-btn.active { color: var(--primary); }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -20px; left: 0; right: 0; height: 3px; background: var(--primary); border-radius: 3px; }

        /* Pinterest Grid (Fixed Rectangles) */
        .pinterest-grid { 
            columns: 4; column-gap: 20px; padding: 20px;
            max-width: 1400px; margin: 0 auto;
        }
        .recipe-pin { 
            break-inside: avoid; margin-bottom: 24px; border-radius: 20px; 
            overflow: hidden; background: var(--light-bg); border: 1px solid var(--border);
            cursor: pointer; transition: var(--transition); position: relative;
        }
        .recipe-pin:hover { transform: translateY(-8px); box-shadow: 0 12px 24px rgba(0,0,0,0.1); }
        .recipe-pin img { width: 100%; height: auto; display: block; object-fit: cover; }
        
        .pin-overlay { 
            position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,0.8));
            opacity: 0; transition: 0.3s; display: flex; flex-direction: column; justify-content: flex-end; padding: 15px; color: white;
        }
        .recipe-pin:hover .pin-overlay { opacity: 1; }
        .save-btn { 
            position: absolute; top: 12px; right: 12px; background: var(--primary); 
            color: white; border: none; padding: 8px 16px; border-radius: 20px; 
            font-weight: 700; font-size: 0.8rem; cursor: pointer; box-shadow: 0 4px 10px rgba(232, 119, 34, 0.3);
        }

        /* Profile & Kitchen */
        .kitchen-tabs { display: flex; gap: 15px; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .k-tab { padding: 8px 16px; border-radius: 12px; cursor: pointer; font-weight: 700; color: var(--grey-text); }
        .k-tab.active { background: var(--primary); color: white; }

        /* Discovery Hub / Pro */
        .pro-badge { background: linear-gradient(135deg, #FFD700, #E87722); color: white; font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; vertical-align: middle; margin-left: 5px; }

        /* Settings Forms */
        .settings-card { background: var(--light-bg); border: 1px solid var(--border); border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 700; margin-bottom: 8px; color: var(--grey-text); text-transform: uppercase; }
        .form-group input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--dark); font-family: inherit; }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .pinterest-grid { columns: 2; column-gap: 12px; padding: 12px; }
            .desktop-tabs { display: none; }
        }

        .tab-content { display: none; padding-bottom: 100px; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; height: 75px; z-index: 2000; }
        .nav-item { color: var(--grey-text); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: 0.2s; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body data-theme="light">

    <header>
        <div class="logo-container" onclick="showTab('discovery')">
            <img src="../assets/logo.png" alt="Calalloo">
            <span>Calalloo<span class="pro-badge">PRO</span></span>
        </div>
        <div class="desktop-tabs">
            <div class="tab-btn active" id="tab-discovery" onclick="showTab('discovery')">Discovery</div>
            <div class="tab-btn" id="tab-map" onclick="showTab('map')">Heritage Map</div>
            <div class="tab-btn" id="tab-profile" onclick="showTab('profile')">My Kitchen</div>
            <div class="tab-btn" id="tab-settings" onclick="showTab('settings')">Settings</div>
        </div>
    </header>

    <!-- DISCOVERY -->
    <div id="discovery" class="tab-content" style="display:block;">
        <div style="padding: 20px 20px 0;">
            <div style="display:flex; gap:10px; background:var(--light-bg); padding:12px 20px; border-radius:16px; border:1px solid var(--border);">
                <i data-lucide="search" style="color:var(--grey-text)"></i>
                <input type="text" placeholder="Search cooks, recipes or heritage dishes..." style="background:none; border:none; outline:none; color:var(--dark); width:100%; font-weight:500;" id="main-search">
            </div>
        </div>
        
        <div class="pinterest-grid" id="recipe-pins">
            <!-- Dishes injected here -->
        </div>
    </div>

    <!-- PROFILE / KITCHEN -->
    <div id="profile" class="tab-content">
        <div style="padding: 25px;">
            <div style="display:flex; align-items:center; gap:20px; margin-bottom:30px;">
                <img id="user-avatar" src="https://via.placeholder.com/100" style="width:80px; height:80px; border-radius:50%; border:3px solid var(--primary);">
                <div>
                    <h1 class="display-font" id="profile-name">Kitchen Keeper</h1>
                    <p style="color:var(--grey-text); font-size:0.9rem;">Caribbean Heritage Expert</p>
                </div>
            </div>

            <div class="kitchen-tabs">
                <div class="k-tab active" onclick="setKitchen('saved')">Saved</div>
                <div class="k-tab" onclick="setKitchen('public')">Public Posts</div>
                <div class="k-tab" onclick="setKitchen('private')">Private Vault</div>
            </div>

            <div id="kitchen-grid" class="pinterest-grid" style="padding:0;">
                <!-- Kitchen items here -->
            </div>
        </div>
    </div>

    <!-- SETTINGS -->
    <div id="settings" class="tab-content">
        <div style="padding: 25px; max-width:800px; margin:0 auto;">
            <h2 class="display-font" style="margin-bottom:30px;">Settings</h2>

            <div class="settings-card">
                <h3 style="margin-bottom:20px; color:var(--primary);">Account Details</h3>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="set-name" value="Prisca Dezigns">
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="set-username" value="@prisca">
                </div>
                <button onclick="saveProfile()" style="background:var(--primary); color:white; border:none; padding:12px 25px; border-radius:12px; font-weight:700; cursor:pointer; width:100%;">Update Profile</button>
            </div>

            <div class="settings-card">
                <h3 style="margin-bottom:20px; color:var(--primary);">Preferences</h3>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <div>
                        <p style="font-weight:700;">Night Mode</p>
                        <p style="font-size:0.8rem; color:var(--grey-text);">Sync UI with your cycle</p>
                    </div>
                    <button onclick="toggleDarkMode()" id="dark-toggle" style="background:var(--border); border:none; padding:8px 16px; border-radius:12px; font-weight:700; cursor:pointer;">OFF</button>
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <p style="font-weight:700;">Language</p>
                        <p style="font-size:0.8rem; color:var(--grey-text);">Current: English</p>
                    </div>
                    <select onchange="setLang(this.value)" style="padding:8px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--dark);">
                        <option value="en">English</option>
                        <option value="es">Español</option>
                        <option value="pt">Português</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <nav>
        <div class="nav-item active" onclick="showTab('discovery')"><i data-lucide="compass"></i></div>
        <div class="nav-item" onclick="showTab('map')"><i data-lucide="map"></i></div>
        <div class="nav-item" onclick="triggerScan()"><i data-lucide="scan"></i></div>
        <div class="nav-item" onclick="showTab('profile')"><i data-lucide="user"></i></div>
        <div class="nav-item" onclick="showTab('settings')"><i data-lucide="settings"></i></div>
    </nav>

    <script>
        const sb = supabase.createClient('https://sktpjacowqaedddtrhuz.supabase.co', 'sb_publishable_ChdrHQEJV7pVpJMKt-ZaUw_6V0WRKAR');
        let recipes = [];

        async function init() {
            lucide.createIcons();
            loadRecipes();
        }

        async function loadRecipes() {
            const { data } = await sb.from('recipes').select('*').limit(12);
            recipes = data || [];
            renderGrid('recipe-pins', recipes);
        }

        function renderGrid(targetId, items) {
            const grid = document.getElementById(targetId);
            if(!grid) return;
            grid.innerHTML = items.map(r => `
                <div class="recipe-pin" onclick="viewDish('${r.id}')">
                    <button class="save-btn" onclick="saveToKitchen(event, '${r.id}')">Save</button>
                    <img src="${r.cover_photo_url || 'https://via.placeholder.com/400x500'}" alt="${r.title}">
                    <div class="pin-overlay">
                        <h3 style="font-size:1rem; font-weight:800;">${r.title}</h3>
                        <p style="font-size:0.75rem; opacity:0.8;">Heritage Dish</p>
                    </div>
                </div>
            `).join('');
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById(id).style.display = 'block';
            if(document.getElementById('tab-'+id)) document.getElementById('tab-'+id).classList.add('active');
            
            // Sync with nav icons
            const navIndex = {discovery:0, map:1, profile:3, settings:4}[id];
            if(navIndex !== undefined) document.querySelectorAll('.nav-item')[navIndex].classList.add('active');
        }

        function toggleDarkMode() {
            const body = document.body;
            const isDark = body.getAttribute('data-theme') === 'dark';
            body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.getElementById('dark-toggle').innerText = isDark ? 'OFF' : 'ON';
            document.getElementById('dark-toggle').style.background = isDark ? 'var(--border)' : 'var(--primary)';
            document.getElementById('dark-toggle').style.color = isDark ? 'var(--dark)' : 'white';
        }

        function viewDish(id) {
            alert("Opening dish details: " + id);
            // This will link to the high-fidelity dish detail page
        }

        function saveToKitchen(e, id) {
            e.stopPropagation();
            alert("Saved to your Private Vault! 🛡️🥘");
        }

        function saveProfile() {
            alert("Profile updated successfully!");
        }

        init();
    </script>
</body>
</html>
