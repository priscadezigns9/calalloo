<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calalloo | Heritage Hub</title>
    <link rel="icon" type="image/png" href="/assets/logo.png">
    <link rel="manifest" href="/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,700;9..144,0,900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #FFFFFF; --primary: #E87722; --dark: #000000; --white: #FFFFFF;
            --border: #F2F2F2; --grey-text: #666666; --light-bg: #FAF9F6;
            --font-display: 'Fraunces', serif; --font-main: 'Inter', sans-serif;
        }
        [data-theme="dark"] {
            --bg: #0A0A0A; --dark: #FFFFFF; --white: #1A1A1A;
            --border: #2A2A2A; --grey-text: #AAAAAA; --light-bg: #111111;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: var(--font-main); background: var(--bg); color: var(--dark); overflow-x: hidden; transition: background 0.3s, color 0.3s; }
        
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 1000; }
        .logo-box { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo-box img { width: 32px; height: 32px; border-radius: 6px; }
        .display-font { font-family: var(--font-display); font-weight: 900; letter-spacing: -0.5px; }

        .nav-pills { display: flex; gap: 5px; background: var(--light-bg); padding: 5px; border-radius: 100px; }
        .pill { padding: 8px 16px; border-radius: 100px; font-size: 0.9rem; font-weight: 600; cursor: pointer; color: var(--grey-text); transition: all 0.2s; }
        .pill.active { background: var(--white); color: var(--dark); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

        .app-container { display: flex; max-width: 1440px; margin: 0 auto; min-height: calc(100vh - 63px); }
        .sidebar { width: 300px; padding: 20px; border-right: 1px solid var(--border); position: sticky; top: 63px; height: calc(100vh - 63px); overflow-y: auto; }
        .sidebar-right { border-right: none; border-left: 1px solid var(--border); }
        .main-content { flex: 1; min-width: 0; }
        
        @media (max-width: 1100px) { .sidebar { display: none; } }
        @media (max-width: 900px) { .nav-pills { display: none; } }

        .hamburger-btn { display: none; cursor: pointer; z-index: 2000; position: relative; padding: 5px; }
        @media (max-width: 1100px) { .hamburger-btn { display: block; } }

        .section-header { font-family: var(--font-display); font-size: 1.1rem; font-weight: 800; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .list-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 10px; cursor: pointer; transition: 0.2s; font-size: 0.9rem; font-weight: 600; }
        .list-item:hover { background: var(--light-bg); }
        .list-item i { color: var(--primary); }

        .tab-content { display: none; padding-bottom: 80px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .search-bar { padding: 20px; position: sticky; top: 0; background: var(--bg); z-index: 900; }
        .search-input { width: 100%; padding: 14px 45px 14px 16px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 1rem; outline: none; background: var(--white); color: var(--dark); }
        
        .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; padding: 0 20px 20px; }
        .recipe-card { border-radius: 12px; overflow: hidden; cursor: pointer; background: var(--white); border: 1px solid var(--border); transition: transform 0.2s; }
        .recipe-image { height: 180px; background-size: cover; background-position: center; }
        .recipe-info { padding: 12px; }

        .user-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 0 20px 20px; }
        .user-card { background: var(--white); border: 1px solid var(--border); border-radius: 16px; padding: 20px; text-align: center; cursor: pointer; transition: 0.2s; }
        .user-card .avatar { width: 60px; height: 60px; border-radius: 50%; margin: 0 auto 10px; background: var(--light-bg); display: flex; align-items: center; justify-content: center; font-weight: 800; color: var(--primary); font-size: 1.2rem; object-fit: cover; }

        .avatar-main { width: 100%; height: 100%; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; background: var(--light-bg); }

        .btn { padding: 14px 24px; border-radius: 12px; font-weight: 700; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.2s; justify-content: center; width: 100%; }
        .btn-primary { background: var(--primary); color: white; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: flex-end; justify-content: center; z-index: 3000; }
        .modal-content { background: var(--bg); color: var(--dark); width: 100%; max-width: 600px; border-radius: 24px 24px 0 0; padding: 25px; max-height: 95vh; overflow-y: auto; position: relative; }
        
        /* Messenger UI Improvements */
        .hub-modal-content { height: 100vh; max-height: 100vh; border-radius: 0; display: flex; flex-direction: column; }
        @media (min-width: 768px) { .hub-modal-content { height: 85vh; border-radius: 24px; } }
        
        .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .close-hub-btn { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; background: var(--light-bg); border-radius: 50%; border: none; cursor: pointer; color: var(--dark); }

        .messenger-bubble { position: fixed; bottom: 30px; right: 30px; background: var(--primary); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 15px rgba(232,119,34,0.4); z-index: 2000; }
        .messenger-bubble img { width: 35px; height: 35px; filter: brightness(0) invert(1); }

        .menu-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 4000; display: none; flex-direction: column; padding: 40px 25px; }
        .menu-item { padding: 18px 0; border-bottom: 1px solid var(--border); font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 15px; cursor: pointer; color: var(--dark); }
        .menu-item i { color: var(--primary); }

        /* Pinterest Style Dish Feed */
        .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        .gallery-item { position: relative; border-radius: 12px; overflow: hidden; height: 150px; cursor: pointer; }
        .gallery-img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>
    <header>
        <div class="logo-box" onclick="showTab('discovery')"><img src="https://priscadezigns9.github.io/calalloo/assets/logo.png" alt="Calalloo"><span class="display-font">Calalloo</span></div>
        <div class="nav-pills">
            <div class="pill active" onclick="showTab('discovery')">Discovery</div>
            <div class="pill" onclick="showTab('vision')">Vision</div>
            <div class="pill" onclick="showTab('map')">Map</div>
            <div class="pill" onclick="showTab('profile')">Profile</div>
            <div class="pill" onclick="showTab('settings')">Settings</div>
        </div>
        <div class="header-actions">
            <div class="hamburger-btn" onclick="toggleMenu()"><i data-lucide="menu" style="width: 28px; height: 28px;"></i></div>
        </div>
    </header>

    <div class="app-container">
        <aside class="sidebar">
            <div class="section-header"><i data-lucide="users"></i> Heritage Groups</div>
            <div id="sidebar-groups"><p style="font-size: 0.8rem; opacity: 0.5; padding: 10px;">No groups yet</p></div>
            <div class="list-item" onclick="openCreateGroup()" style="color: var(--primary); border-top: 1px solid var(--border); margin-top: 10px; padding-top: 10px;"><i data-lucide="plus-circle"></i> Create Group</div>
        </aside>

        <main class="main-content">
            <div id="discovery" class="tab-content active">
                <div class="search-bar"><input type="text" class="search-input" placeholder="Search recipes or keepers..." oninput="handleUnifiedSearch(this.value)"></div>
                <div id="search-results-users" style="display:none;"><h3 class="display-font" style="margin: 0 20px 15px;">Heritage Keepers</h3><div id="user-results-grid" class="user-grid"></div></div>
                <div id="search-results-recipes">
                    <h3 class="display-font" id="recipe-search-title" style="margin: 0 20px 15px; display:none;">Recipes</h3>
                    <div id="discovery-grid" class="recipe-grid"></div>
                </div>
            </div>

            <div id="vision" class="tab-content">
                <div style="padding: 20px; text-align: center;">
                    <video id="video-feed" autoplay playsinline style="width: 100%; border-radius: 12px; aspect-ratio: 4/3; object-fit: cover; background: #000; margin-bottom: 20px; display: none;"></video>
                    <div id="camera-blocked" style="padding: 40px; background: var(--light-bg); border-radius: 12px; margin-bottom: 20px;"><i data-lucide="camera-off" style="width: 48px; height: 48px; opacity: 0.2; margin-bottom: 10px;"></i><p>Camera is disabled. Enable it in Settings.</p></div>
                    <div style="display: flex; gap: 10px; justify-content: center;">
                        <button class="btn btn-primary" id="cam-action-btn" onclick="initCam()"><i data-lucide="camera"></i> Start Camera</button>
                        <label class="btn btn-secondary" style="width: auto;"><i data-lucide="upload"></i> Upload<input type="file" style="display: none;" onchange="handleVisionUpload(this)" accept="image/*"></label>
                    </div>
                </div>
            </div>

            <div id="map" class="tab-content"><div id="map-container" style="width: 100%; height: 60vh;"></div></div>
            
            <div id="profile" class="tab-content">
                <div style="padding: 40px 20px; text-align: center; border-bottom: 1px solid var(--border);">
                    <div style="position: relative; width: 100px; height: 100px; margin: 0 auto 15px; cursor: pointer;" onclick="document.getElementById('avatar-input').click()"><img id="p-avatar" class="avatar-main" src="https://via.placeholder.com/100?text=HP" onerror="this.src='https://via.placeholder.com/100?text=HP'"><input type="file" id="avatar-input" style="display: none;" onchange="uploadAvatar(this)" accept="image/*"></div>
                    <input type="text" id="p-username" class="display-font" style="text-align: center; border: 1.5px dashed var(--border); border-radius: 8px; padding: 5px 15px; background: none; font-size: 1.8rem; width: 100%; max-width: 300px; color: var(--dark); outline: none; margin-bottom: 10px;" placeholder="username">
                    <textarea id="p-bio" placeholder="Add your heritage bio..." style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 12px; resize: none; min-height: 80px; margin-bottom: 15px; background: var(--white); color: var(--dark);"></textarea>
                    <button class="btn btn-primary" onclick="saveFullProfile()">Save Profile</button>
                </div>
                <div class="profile-tabs" style="margin-top: 20px;"><div class="profile-tab active" onclick="switchProfileTab('saved')">Saved</div><div class="profile-tab" onclick="switchProfileTab('public')">Public</div><div class="profile-tab" onclick="switchProfileTab('private')">Private</div></div>
                <div id="profile-kitchen-grid" class="recipe-grid" style="padding-top: 20px;"></div>
            </div>

            <div id="settings" class="tab-content">
                <div style="padding: 40px 20px;">
                    <h1 class="display-font" style="margin-bottom: 30px;">Settings</h1>
                    <div class="list-item"><i data-lucide="moon"></i> Dark Mode <label class="switch"><input type="checkbox" onchange="toggleTheme()"><span class="slider"></span></label></div>
                    <div class="list-item" onclick="signOut()" style="color: red; margin-top: 50px;"><i data-lucide="log-out"></i> Sign Out</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Hub Modal (Messenger) -->
    <div id="hub-modal" class="modal">
        <div class="modal-content hub-modal-content">
            <div class="modal-header">
                <div style="display:flex; align-items:center; gap:10px">
                    <img src="https://priscadezigns9.github.io/calalloo/assets/logo.png" style="width:32px; height:32px; border-radius:6px">
                    <h2 class="display-font">Messenger</h2>
                </div>
                <button class="close-hub-btn" onclick="closeHub()"><i data-lucide="x"></i></button>
            </div>
            <div id="hub-messages" style="flex: 1; overflow-y: auto; background: var(--light-bg); border-radius: 12px; padding: 15px; margin-bottom: 15px;"></div>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="hub-input" placeholder="Type a message..." style="flex: 1; padding: 14px; border: 1.5px solid var(--border); border-radius: 12px; background: var(--white); color: var(--dark);">
                <button class="btn btn-primary" style="width: auto;" onclick="sendHubMessage()"><i data-lucide="send"></i></button>
            </div>
        </div>
    </div>

    <!-- Recipe Modal -->
    <div id="recipe-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="rd-title" class="display-font"></h2>
                <button class="close-btn" onclick="closeRecipe()"><i data-lucide="x"></i></button>
            </div>
            <img id="rd-img" style="width:100%; height:250px; object-fit:cover; border-radius:12px; margin-bottom:20px;">
            <p id="rd-desc" class="grey-text" style="margin-bottom:20px;"></p>
            <div class="comment-section"><div id="rd-comments"></div></div>
        </div>
    </div>

    <div class="messenger-bubble" onclick="openHub()"><img src="https://priscadezigns9.github.io/calalloo/assets/logo.png" alt="Messenger"></div>

    <script>
        const sb = supabase.createClient('https://sktpjacowqaedddtrhuz.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNrdHBqYWNvd3FhZWRkZHRyaHV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NDk5MzEsImV4cCI6MjA5NDIyNTkzMX0.FK4N_ATFTaUuGXrYu_7OBn3qCdlo0rOzxk-E6TxJxqs');
        let allRecipes = [], currentOpenRecipeId = null;

        async function loadData() {
            const { data: { user } } = await sb.auth.getUser(); if(!user) { window.location.href = '/login/'; return; }
            const { data: recipes } = await sb.from('recipes').select('*').eq('is_published', true).order('created_at', {ascending:false});
            allRecipes = recipes || [];
            renderRecipes(allRecipes);
            const { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single();
            if(profile) {
                document.getElementById('p-username').value = profile.username || user.user_metadata.username || 'keeper';
                document.getElementById('p-avatar').src = profile.avatar_url || 'https://via.placeholder.com/100?text=HP';
                document.getElementById('p-bio').value = profile.bio || '';
            }
            lucide.createIcons();
        }

        async function handleUnifiedSearch(query) {
            if(query.length < 2) { 
                renderRecipes(allRecipes); 
                document.getElementById('search-results-users').style.display = 'none'; 
                return; 
            }
            // Filter Recipes
            const r = allRecipes.filter(x => x.title.toLowerCase().includes(query.toLowerCase()));
            renderRecipes(r);
            
            // Filter Users - Only profiles matching username or bio
            const { data: u } = await sb.from('profiles').select('*')
                .or(`username.ilike.%${query}%,bio.ilike.%${query}%`)
                .limit(10);
            
            if(u && u.length) {
                document.getElementById('search-results-users').style.display = 'block';
                document.getElementById('user-results-grid').innerHTML = u.map(user => `
                    <div class="user-card" onclick="openPublicProfile('${user.id}')">
                        <img class="avatar" src="${user.avatar_url || 'https://via.placeholder.com/60?text=HP'}" onerror="this.src='https://via.placeholder.com/60?text=HP'">
                        <h4>@${user.username || 'keeper'}</h4>
                    </div>
                `).join('');
            } else {
                document.getElementById('search-results-users').style.display = 'none';
            }
        }

        function renderRecipes(list) {
            document.getElementById('discovery-grid').innerHTML = list.map(r => `
                <div class="recipe-card" onclick="openRecipe('${r.id}')">
                    <div class="recipe-image" style="background-image: url(${r.cover_photo_url})"></div>
                    <div class="recipe-info"><h3>${r.title}</h3></div>
                </div>
            `).join('');
        }

        async function saveFullProfile() {
            const { data: { user } } = await sb.auth.getUser();
            const username = document.getElementById('p-username').value;
            const bio = document.getElementById('p-bio').value;
            const { error } = await sb.from('profiles').upsert({ id: user.id, username, bio, updated_at: new Date() });
            if(!error) alert('Profile updated!');
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll(`.pill[onclick*="${id}"]`).forEach(p => p.classList.add('active'));
        }

        function openHub() { document.getElementById('hub-modal').style.display = 'flex'; }
        function closeHub() { document.getElementById('hub-modal').style.display = 'none'; }
        function toggleMenu() { alert('Menu coming soon'); }
        function closeRecipe() { document.getElementById('recipe-modal').style.display = 'none'; }
        function signOut() { sb.auth.signOut().then(() => window.location.href = '/login/'); }

        window.onload = loadData;
    </script>
</body>
</html>
