<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calalloo | Professional Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #E87722; --green: #2D5A27; --white: #FFFFFF; --bg: #FAFAFA; --dark: #1A0D00; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--dark); overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        header { background: var(--white); border-bottom: 1px solid rgba(0,0,0,0.05); padding: 15px 40px; display: flex; align-items: center; justify-content: space-between; z-index: 100; }
        .logo { font-family: 'Fraunces', serif; color: var(--primary); font-size: 1.5rem; font-weight: 900; text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .logo img { height: 28px; }
        .nav-pills { display: flex; gap: 10px; background: #F0F0F0; padding: 5px; border-radius: 50px; }
        .pill { padding: 10px 25px; border-radius: 40px; cursor: pointer; font-weight: 700; font-size: 13px; color: #666; transition: 0.3s; }
        .pill.active { background: var(--white); color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .container { flex: 1; overflow-y: auto; padding: 40px; max-width: 1200px; margin: 0 auto; width: 100%; position: relative; }
        .view { display: none; height: 100%; }
        .view.active { display: block; }

        .card { background: var(--white); border-radius: 30px; padding: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        /* Profile Area */
        .photo-upload { width: 120px; height: 120px; border-radius: 50%; background: #F5F5F5; border: 3px dashed #DDD; display: flex; align-items: center; justify-content: center; cursor: pointer; margin-bottom: 30px; position: relative; overflow: hidden; }
        .photo-upload img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Functional Scanner */
        #scanner-ui { position: relative; width: 100%; max-width: 640px; margin: 0 auto; background: #000; border-radius: 20px; overflow: hidden; aspect-ratio: 4/3; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .scan-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 2px solid var(--primary); opacity: 0.5; pointer-events: none; }
        .scan-btn { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 50px; font-weight: 800; cursor: pointer; }

        /* Toggles */
        .setting-row { display: flex; align-items: center; justify-content: space-between; padding: 20px; background: #F9F9F9; border-radius: 15px; margin-bottom: 10px; }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #DDD; transition: .3s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--green); }
        input:checked + .slider:before { transform: translateX(20px); }

        .btn { padding: 15px 35px; border-radius: 50px; font-weight: 800; cursor: pointer; transition: 0.3s; border: none; font-size: 14px; }
        .btn-save { background: var(--primary); color: white; }
    </style>
</head>
<body>

<header>
    <a href="/index.html" class="logo">Calalloo <img src="/icon.svg" alt="logo"></a>
    <div class="nav-pills">
        <div class="pill active" onclick="switchView('feed', this)">Feed</div>
        <div class="pill" onclick="switchView('scanner', this); startScanner();">Scanner</div>
        <div class="pill" onclick="switchView('map', this)">Map</div>
        <div class="pill" onclick="switchView('profile', this)">Profile</div>
        <div class="pill" onclick="switchView('settings', this)">Settings</div>
    </div>
</header>

<div class="container">
    <div id="feed" class="view active">
        <h2 style="font-family: Fraunces; margin-bottom: 30px;">Discovery Feed</h2>
        <div id="feed-items">Loading active heritage nodes...</div>
    </div>

    <div id="scanner" class="view">
        <h2 style="font-family: Fraunces; margin-bottom: 30px;">Heritage Scanner</h2>
        <div id="scanner-ui">
            <video id="video" autoplay playsinline></video>
            <div class="scan-overlay"></div>
            <button class="scan-btn" onclick="captureFrame()">IDENTIFY HERITAGE</button>
        </div>
    </div>

    <div id="map" class="view">
        <h2 style="font-family: Fraunces; margin-bottom: 30px;">Heritage Map</h2>
        <div id="map-render" style="height: 400px; background: #eee; border-radius: 20px; display: flex; align-items: center; justify-content: center;">Map Initialization Active</div>
    </div>

    <div id="profile" class="view">
        <h2 style="font-family: Fraunces; margin-bottom: 30px;">Profile Node</h2>
        <div class="card">
            <div class="photo-upload" onclick="document.getElementById('photo_input').click()">
                <img id="photo_preview" src="">
            </div>
            <input type="file" id="photo_input" style="display:none;" onchange="previewPhoto(this)">
            <input type="text" id="p_name" style="width:100%; padding:15px; margin-bottom:20px; border-radius:10px; border:1px solid #ddd;" placeholder="Full Name">
            <textarea id="p_bio" style="width:100%; height:100px; padding:15px; border-radius:10px; border:1px solid #ddd; margin-bottom:20px;" placeholder="Heritage bio..."></textarea>
            <button class="btn btn-save" onclick="saveProfile()">SAVE PROFILE</button>
        </div>
    </div>

    <div id="settings" class="view">
        <h2 style="font-family: Fraunces; margin-bottom: 30px;">Vault</h2>
        <div class="card">
            <div class="setting-row"><span>📍 Location Sync</span><label class="switch"><input type="checkbox" checked><span class="slider"></span></label></div>
            <div class="setting-row"><span>📸 Scanner Access</span><label class="switch"><input type="checkbox" checked><span class="slider"></span></label></div>
        </div>
    </div>
</div>

<script>
    const sb = supabase.createClient('https://sktpjacowqaedddtrhuz.supabase.co', '{{credential:supabase-anon-key}}');

    function switchView(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        if(id !== 'scanner') stopScanner();
    }

    async function startScanner() {
        const video = document.getElementById('video');
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            video.srcObject = stream;
        } catch (err) { alert("Camera access denied."); }
    }

    function stopScanner() {
        const video = document.getElementById('video');
        if (video.srcObject) {
            video.srcObject.getTracks().forEach(track => track.stop());
            video.srcObject = null;
        }
    }

    async function saveProfile() {
        const name = document.getElementById('p_name').value;
        const bio = document.getElementById('p_bio').value;
        const { error } = await sb.from('profiles').upsert({ id: localStorage.getItem('calalloo_uid') || '0000', full_name: name, bio: bio });
        if(!error) alert("Heritage Secured.");
    }

    function previewPhoto(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => document.getElementById('photo_preview').src = e.target.result;
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>
</body>
</html>
