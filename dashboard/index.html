<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Calalloo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#FF8C00',
                        dark: '#1A1A1A',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #1A1A1A; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen bg-dark pb-20">
    <!-- Header -->
    <header class="p-6 flex justify-between items-center border-b border-zinc-800">
        <h1 class="text-2xl font-bold text-brand italic">Calalloo</h1>
        <button id="logout-btn" class="text-zinc-400 hover:text-white transition-colors">Logout</button>
    </header>

    <main class="p-6 max-w-lg mx-auto space-y-8">
        <!-- Profile Card -->
        <section class="glass rounded-3xl p-6 text-center">
            <div id="profile-pic" class="w-24 h-24 bg-zinc-800 rounded-full mx-auto mb-4 border-2 border-brand flex items-center justify-center overflow-hidden">
                <span class="text-3xl text-zinc-600">?</span>
            </div>
            <h2 id="display-username" class="text-2xl font-bold">Loading...</h2>
            <p id="display-bio" class="text-zinc-400 mt-1 italic">Fetching your story...</p>
            
            <div class="mt-6 flex justify-center gap-4">
                <div class="text-center">
                    <span class="block text-brand font-bold">Pin</span>
                    <span id="display-pin" class="text-xs text-zinc-500">----</span>
                </div>
            </div>
        </section>

        <!-- Quick Actions -->
        <section class="grid grid-cols-2 gap-4">
            <a href="/recipes/" class="glass p-6 rounded-2xl flex flex-col items-center hover:border-brand transition-colors">
                <span class="text-2xl mb-2">🍲</span>
                <span class="font-medium">Recipes</span>
            </a>
            <a href="/community/" class="glass p-6 rounded-2xl flex flex-col items-center hover:border-brand transition-colors">
                <span class="text-2xl mb-2">🤝</span>
                <span class="font-medium">Community</span>
            </a>
            <a href="/markets/" class="glass p-6 rounded-2xl flex flex-col items-center hover:border-brand transition-colors">
                <span class="text-2xl mb-2">🛒</span>
                <span class="font-medium">Markets</span>
            </a>
            <a href="/profile/" class="glass p-6 rounded-2xl flex flex-col items-center hover:border-brand transition-colors">
                <span class="text-2xl mb-2">⚙️</span>
                <span class="font-medium">Settings</span>
            </a>
        </section>

        <!-- Social Layer Mandate -->
        <section class="glass p-6 rounded-3xl space-y-4">
            <h3 class="font-bold text-brand uppercase text-xs tracking-widest">Heritage Hub</h3>
            <button class="w-full py-4 bg-zinc-800 rounded-xl font-bold hover:bg-zinc-700 transition-colors">Find & Follow</button>
            <button class="w-full py-4 bg-zinc-800 rounded-xl font-bold hover:bg-zinc-700 transition-colors">In-App Chat</button>
        </section>
    </main>

    <!-- Bottom Nav (Mobile First) -->
    <nav class="fixed bottom-0 left-0 right-0 bg-zinc-900 border-t border-zinc-800 p-4 flex justify-around">
        <a href="/dashboard/" class="text-brand">🏠</a>
        <a href="/scan/" class="text-zinc-500">📷</a>
        <a href="/collections/" class="text-zinc-500">📚</a>
        <a href="/magazine/" class="text-zinc-500">📰</a>
    </nav>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        const supabase = createClient('https://sktpjacowqaedddtrhuz.supabase.co', '{{credential:supabase-callaloo-dpanyard}}')

        async function init() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = '/login/';
                return;
            }

            const user = session.user;
            
            // Try to fetch profile
            const { data: profile, error } = await supabase
                .from('profiles')
                .select('*')
                .eq('id', user.id)
                .single();

            if (profile) {
                document.getElementById('display-username').innerText = profile.username || user.email.split('@')[0];
                document.getElementById('display-bio').innerText = profile.bio || 'Add a bio to your profile';
                document.getElementById('display-pin').innerText = profile.whatsapp_pin || 'Not set';
                if (profile.photo_url) {
                    document.getElementById('profile-pic').innerHTML = `<img src="${profile.photo_url}" class="w-full h-full object-cover">`;
                }
            } else {
                document.getElementById('display-username').innerText = user.email.split('@')[0];
                document.getElementById('display-bio').innerText = 'Welcome to Calalloo!';
            }
        }

        document.getElementById('logout-btn').addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.href = '/login/';
        });

        init();
    </script>
</body>
</html>
