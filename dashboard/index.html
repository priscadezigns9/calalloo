<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calalloo | Heritage Hub v33.0 Ultra</title>
    <link rel="icon" type="image/png" href="../assets/logo.png">
    <link rel="manifest" href="/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,700;9..144,0,900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #FFFFFF; --primary: #E87722; --dark: #000000; --white: #FFFFFF;
            --border: #F2F2F2; --grey-text: #666666; --light-bg: #FAF9F6;
            --font-display: 'Fraunces', serif; --font-main: 'Inter', sans-serif;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        [data-theme="dark"] {
            --bg: #0A0A0A; --white: #0A0A0A; --dark: #FFFFFF;
            --border: #1F1F1F; --grey-text: #A0A0A0; --light-bg: #141414;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: var(--font-main); background: var(--bg); color: var(--dark); transition: var(--transition); }
        
        header { position: sticky; top: 0; background: var(--bg); border-bottom: 1px solid var(--border); padding: 12px 20px; z-index: 1000; display: flex; align-items: center; justify-content: space-between; }
        .logo-container { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo-container img { width: 32px; height: 32px; border-radius: 50%; }
        .logo-container span { font-family: var(--font-display); font-weight: 900; font-size: 1.4rem; letter-spacing: -0.02em; }
        .pro-badge { background: linear-gradient(135deg, #FFD700, #E87722); color: white; font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; font-weight: 900; margin-left: 6px; }

        /* Pinterest Grid */
        .pinterest-grid { columns: 4; column-gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto; }
        .recipe-pin { break-inside: avoid; margin-bottom: 24px; border-radius: 20px; overflow: hidden; background: var(--light-bg); border: 1px solid var(--border); cursor: pointer; transition: var(--transition); position: relative; }
        .recipe-pin img { width: 100%; height: 280px; display: block; object-fit: cover; }
        .pin-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.8)); opacity: 0; transition: 0.3s; display: flex; flex-direction: column; justify-content: flex-end; padding: 15px; color: white; }
        .recipe-pin:hover .pin-overlay { opacity: 1; }
        .save-btn { position: absolute; top: 12px; right: 12px; background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 20px; font-weight: 700; font-size: 0.8rem; cursor: pointer; z-index: 10; }

        /* Detail Modal */
        #detail-modal, #add-recipe-modal { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: none; flex-direction: column; overflow-y: auto; }
        .modal-header { position: sticky; top: 0; background: var(--bg); padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .detail-hero { width: 100%; height: 40vh; object-fit: cover; }
        .detail-content { padding: 30px; max-width: 800px; margin: 0 auto; width: 100%; }

        /* Form Styling */
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; font-size: 0.75rem; font-weight: 800; color: var(--grey-text); text-transform: uppercase; margin-bottom: 10px; }
        .form-group input, .form-group textarea { width: 100%; padding: 16px; border-radius: 16px; border: 1px solid var(--border); background: var(--light-bg); color: var(--dark); font-family: inherit; font-size: 1rem; }
        .btn-submit { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 18px; font-weight: 800; width: 100%; cursor: pointer; }

        .ai-camera-fab { position: fixed; bottom: 100px; right: 25px; width: 65px; height: 65px; border-radius: 50%; background: var(--primary); color: white; border: none; box-shadow: 0 8px 32px rgba(232, 119, 34, 0.4); display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 4000; }
        
        nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; height: 80px; z-index: 1000; padding-bottom: 10px; }
        .nav-item { color: var(--grey-text); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 0.65rem; font-weight: 700; }
        .nav-item.active { color: var(--primary); }

        @media (max-width: 768px) { .pinterest-grid { columns: 2; column-gap: 12px; padding: 12px; } }
    </style>
</head>
<body>

    <header>
        <div class="logo-container" onclick="showTab('discovery')">
            <img src="../assets/logo.png" alt="Calalloo">
            <span>Calalloo<span class="pro-badge">PRO</span></span>
        </div>
        <button onclick="openAddRecipe()" style="background:var(--light-bg); border:1px solid var(--border); padding:8px 16px; border-radius:12px; font-weight:700; cursor:pointer;">+ Add Dish</button>
    </header>

    <!-- DISCOVERY HUB -->
    <div id="discovery" class="tab-content" style="display:block;">
        <div class="pinterest-grid" id="discovery-pins"></div>
    </div>

    <!-- DETAIL MODAL -->
    <div id="detail-modal">
        <div class="modal-header">
            <i data-lucide="arrow-left" onclick="closeModal('detail-modal')" style="cursor:pointer;"></i>
            <button class="save-btn" id="modal-save-btn" style="position:static;">Save to Kitchen</button>
        </div>
        <img id="detail-img" class="detail-hero">
        <div class="detail-content">
            <h1 class="display-font" id="detail-title" style="font-size:2.5rem; margin-bottom:10px;"></h1>
            <p id="detail-author" style="color:var(--primary); font-weight:700; margin-bottom:30px;"></p>
            
            <div style="margin-bottom:40px;">
                <h3 style="text-transform:uppercase; font-size:0.8rem; color:var(--grey-text); margin-bottom:15px;">Ingredients</h3>
                <div id="detail-ingredients" style="line-height:1.8;"></div>
            </div>
            
            <div>
                <h3 style="text-transform:uppercase; font-size:0.8rem; color:var(--grey-text); margin-bottom:15px;">Instructions</h3>
                <div id="detail-instructions" style="line-height:1.8;"></div>
            </div>
        </div>
    </div>

    <!-- ADD RECIPE MODAL -->
    <div id="add-recipe-modal">
        <div class="modal-header">
            <h2 class="display-font">Share Your Dish</h2>
            <i data-lucide="x" onclick="closeModal('add-recipe-modal')" style="cursor:pointer;"></i>
        </div>
        <div class="detail-content">
            <div class="form-group">
                <label>Dish Photo</label>
                <div style="width:100%; height:200px; border:2px dashed var(--border); border-radius:20px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer;" onclick="document.getElementById('dish-img-input').click()">
                    <i data-lucide="camera" style="width:32px; height:32px; color:var(--grey-text); margin-bottom:10px;"></i>
                    <p style="font-size:0.8rem; color:var(--grey-text);">Click to upload</p>
                    <img id="dish-preview" style="display:none; position:absolute; width:100%; height:100%; object-fit:cover; border-radius:20px;">
                </div>
                <input type="file" id="dish-img-input" style="display:none;" onchange="previewDish(this)">
            </div>
            <div class="form-group">
                <label>Dish Name</label>
                <input type="text" id="add-title" placeholder="e.g. Grandma's Stew Chicken">
            </div>
            <div class="form-group">
                <label>Ingredients</label>
                <textarea id="add-ingredients" rows="5" placeholder="List ingredients here..."></textarea>
            </div>
            <div class="form-group">
                <label>Instructions / Story</label>
                <textarea id="add-instructions" rows="8" placeholder="Share your cooking process or the heritage story..."></textarea>
            </div>
            <button class="btn-submit" onclick="submitDish()">Post to Heritage Feed</button>
        </div>
    </div>

    <nav>
        <div class="nav-item active" onclick="showTab('discovery')"><i data-lucide="compass"></i>Discovery</div>
        <div class="nav-item" onclick="showTab('map')"><i data-lucide="map"></i>Map</div>
        <div class="nav-item" onclick="triggerScan()"><i data-lucide="scan"></i>Scan</div>
        <div class="nav-item" onclick="showTab('profile')"><i data-lucide="user"></i>Kitchen</div>
        <div class="nav-item" onclick="showTab('settings')"><i data-lucide="settings"></i>Settings</div>
    </nav>

    <script>
        const sb = supabase.createClient('https://sktpjacowqaedddtrhuz.supabase.co', 'sb_publishable_ChdrHQEJV7pVpJMKt-ZaUw_6V0WRKAR');
        let recipes = [];

        async function init() {
            lucide.createIcons();
            loadDiscovery();
        }

        async function loadDiscovery() {
            const { data } = await sb.from('recipes').select('*').order('created_at', {ascending: false});
            recipes = data || [];
            renderPins('discovery-pins', recipes);
        }

        function renderPins(targetId, items) {
            const grid = document.getElementById(targetId);
            if(!grid) return;
            grid.innerHTML = items.map(r => `
                <div class="recipe-pin" onclick="openDish('${r.id}')">
                    <button class="save-btn" onclick="saveToKitchen(event, '${r.id}')">Save</button>
                    <img src="${r.cover_photo_url || 'https://via.placeholder.com/400x500'}" alt="${r.title}">
                    <div class="pin-overlay">
                        <h3 style="font-size:1.1rem; font-weight:800;">${r.title}</h3>
                        <p style="font-size:0.8rem; opacity:0.8;">Heritage Classic</p>
                    </div>
                </div>
            `).join('');
        }

        function openDish(id) {
            const r = recipes.find(item => item.id === id);
            if(!r) return;
            document.getElementById('detail-img').src = r.cover_photo_url;
            document.getElementById('detail-title').innerText = r.title;
            document.getElementById('detail-author').innerText = "By Heritage Keeper";
            document.getElementById('detail-ingredients').innerText = r.ingredients || "Ingredients shared in Private Vault.";
            document.getElementById('detail-instructions').innerText = r.instructions || "Instructions shared in Private Vault.";
            document.getElementById('detail-modal').style.display = 'flex';
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function openAddRecipe() { document.getElementById('add-recipe-modal').style.display = 'flex'; }

        function previewDish(input) {
            if(input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const prev = document.getElementById('dish-preview');
                    prev.src = e.target.result;
                    prev.style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function submitDish() {
            const title = document.getElementById('add-title').value;
            const ingredients = document.getElementById('add-ingredients').value;
            const instructions = document.getElementById('add-instructions').value;
            
            if(!title) { alert("Please name your dish!"); return; }
            
            alert("Dish Submitted! 🥘 After a quick heritage check, it will be live in the Discovery feed.");
            closeModal('add-recipe-modal');
        }

        function saveToKitchen(e, id) { e.stopPropagation(); alert("Saved to Private Vault!"); }

        init();
    </script>
</body>
</html>
