<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calalloo | Heritage Hub</title>
    <link rel="icon" type="image/png" href="/assets/logo.png">
    <link rel="manifest" href="/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,700;9..144,0,900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #FFFFFF; --primary: #E87722; --dark: #000000; --white: #FFFFFF;
            --border: #F2F2F2; --grey-text: #666666; --light-bg: #FAF9F6;
            --font-display: 'Fraunces', serif; --font-main: 'Inter', sans-serif;
        }
        [data-theme="dark"] {
            --bg: #0A0A0A; --dark: #FFFFFF; --white: #1A1A1A;
            --border: #2A2A2A; --grey-text: #AAAAAA; --light-bg: #111111;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: var(--font-main); background: var(--bg); color: var(--dark); overflow-x: hidden; transition: background 0.3s, color 0.3s; }
        
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 1000; }
        .logo-box { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo-box img { width: 32px; height: 32px; border-radius: 6px; }
        .display-font { font-family: var(--font-display); font-weight: 900; letter-spacing: -0.5px; }

        .nav-pills { display: flex; gap: 5px; background: var(--light-bg); padding: 5px; border-radius: 100px; }
        .pill { padding: 8px 16px; border-radius: 100px; font-size: 0.9rem; font-weight: 600; cursor: pointer; color: var(--grey-text); transition: all 0.2s; }
        .pill.active { background: var(--white); color: var(--dark); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        @media (max-width: 900px) { .nav-pills { display: none; } }

        .header-actions { display: flex; align-items: center; gap: 15px; }
        .hamburger-btn { cursor: pointer; color: var(--dark); display: flex; align-items: center; }

        /* Floating Messenger Bubble */
        .messenger-bubble { position: fixed; bottom: 30px; right: 30px; background: var(--primary); color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 15px rgba(232,119,34,0.4); z-index: 2000; transition: transform 0.2s; }
        .messenger-bubble:hover { transform: scale(1.05); }
        @media (max-width: 600px) { .messenger-bubble { bottom: 20px; right: 20px; } }

        .tab-content { display: none; padding-bottom: 80px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .search-bar { padding: 20px; position: sticky; top: 63px; background: var(--bg); z-index: 900; }
        .search-input { width: 100%; padding: 14px 45px 14px 16px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 1rem; outline: none; background: var(--white); color: var(--dark); }
        
        .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 0 20px 20px; }
        .recipe-card { border-radius: 12px; overflow: hidden; cursor: pointer; background: var(--white); border: 1px solid var(--border); transition: transform 0.2s; }
        .recipe-image { height: 160px; background-size: cover; background-position: center; }
        .recipe-info { padding: 12px; }

        .profile-header { padding: 40px 20px; text-align: center; border-bottom: 1px solid var(--border); }
        .avatar-wrapper { position: relative; width: 100px; height: 100px; margin: 0 auto 15px; cursor: pointer; }
        .avatar-main { width: 100%; height: 100%; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; }
        .avatar-edit { position: absolute; bottom: 0; right: 0; background: var(--primary); color: white; padding: 5px; border-radius: 50%; border: 2px solid var(--bg); }

        .stats { display: flex; justify-content: center; gap: 30px; margin: 20px 0; }
        .stat-item { text-align: center; }
        .stat-val { font-weight: 800; font-size: 1.2rem; display: block; }
        .stat-label { font-size: 0.8rem; color: var(--grey-text); }

        .btn { padding: 14px 24px; border-radius: 12px; font-weight: 700; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.2s; justify-content: center; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: var(--light-bg); color: var(--dark); border: 1.5px solid var(--border); }

        #map-container { width: 100%; height: 70vh; z-index: 1; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: flex-end; justify-content: center; z-index: 3000; }
        .modal-content { background: var(--bg); color: var(--dark); width: 100%; max-width: 600px; border-radius: 24px 24px 0 0; padding: 25px; max-height: 90vh; overflow-y: auto; }
        .close-btn { background: none; border: none; cursor: pointer; color: var(--dark); }

        .menu-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 4000; display: none; flex-direction: column; padding: 40px 25px; }
        .menu-item { padding: 18px 0; border-bottom: 1px solid var(--border); font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 15px; cursor: pointer; color: var(--dark); }
        .menu-item i { color: var(--primary); }

        #install-banner { display: none; background: var(--primary); color: white; padding: 15px 20px; position: fixed; bottom: 0; left: 0; right: 0; z-index: 5000; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <header>
        <div class="logo-box" onclick="showTab('discovery')">
            <img src="/assets/logo.png">
            <span class="display-font">Calalloo</span>
        </div>
        <div class="nav-pills">
            <div class="pill active" onclick="showTab('discovery')">Discovery</div>
            <div class="pill" onclick="showTab('vision')">Vision</div>
            <div class="pill" onclick="showTab('map')">Map</div>
            <div class="pill" onclick="showTab('profile')">Profile</div>
            <div class="pill" onclick="showTab('settings')">Settings</div>
        </div>
        <div class="header-actions">
            <div class="hamburger-btn" onclick="toggleMenu()"><i data-lucide="menu" style="width: 28px; height: 28px;"></i></div>
        </div>
    </header>

    <div class="messenger-bubble" onclick="openHub()"><i data-lucide="message-circle"></i></div>

    <div id="discovery" class="tab-content active">
        <div class="search-bar">
            <div style="position: relative;">
                <input type="text" class="search-input" placeholder="Search heritage recipes..." oninput="handleSearch(this.value)">
                <i data-lucide="search" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--grey-text); width: 20px;"></i>
            </div>
        </div>
        <div id="discovery-grid" class="recipe-grid"></div>
    </div>

    <div id="vision" class="tab-content">
        <div style="padding: 20px; text-align: center;">
            <video id="video-feed" autoplay playsinline style="width: 100%; border-radius: 12px; aspect-ratio: 4/3; object-fit: cover; background: #000; margin-bottom: 20px; display: none;"></video>
            <img id="upload-preview" style="width: 100%; border-radius: 12px; margin-bottom: 20px; display: none;">
            <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
                <button class="btn btn-primary" onclick="initCam()"><i data-lucide="camera"></i> Start Camera</button>
                <button class="btn btn-secondary" onclick="flipCamera()"><i data-lucide="refresh-cw"></i> Flip</button>
                <label class="btn btn-secondary">
                    <i data-lucide="upload"></i> Upload
                    <input type="file" style="display: none;" onchange="handleVisionUpload(this)" accept="image/*">
                </label>
            </div>
        </div>
    </div>

    <div id="map" class="tab-content">
        <div id="map-container"></div>
    </div>

    <div id="profile" class="tab-content">
        <div class="profile-header">
            <div class="avatar-wrapper" onclick="document.getElementById('avatar-input').click()">
                <img id="p-avatar" class="avatar-main" src="https://via.placeholder.com/100">
                <div class="avatar-edit"><i data-lucide="camera" style="width: 14px; height: 14px;"></i></div>
                <input type="file" id="avatar-input" style="display: none;" accept="image/png, image/jpeg" onchange="uploadAvatar(this)">
            </div>
            <input type="text" id="p-name" class="display-font" style="text-align: center; border: none; background: none; font-size: 2rem; width: 100%; color: var(--dark); outline: none; margin-bottom: 5px;" placeholder="Your Name">
            <p id="p-handle" class="grey-text" style="margin-bottom: 20px;"></p>
            <div class="stats">
                <div class="stat-item"><span class="stat-val" id="stat-recipes">0</span><span class="stat-label">Recipes</span></div>
                <div class="stat-item"><span class="stat-val" id="stat-followers">0</span><span class="stat-label">Followers</span></div>
                <div class="stat-item"><span class="stat-val" id="stat-following">0</span><span class="stat-label">Following</span></div>
            </div>
            <textarea id="p-bio" placeholder="Add your heritage bio..." style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 12px; resize: none; min-height: 80px; margin-bottom: 15px; background: var(--white); color: var(--dark);"></textarea>
            <button class="btn btn-primary" style="width: 100%;" id="save-profile-btn" onclick="saveFullProfile()">Save Profile</button>
        </div>
        <div style="padding: 20px;">
            <h3 class="display-font" style="margin-bottom: 20px;">Saved to Kitchen</h3>
            <div id="kitchen-grid" class="recipe-grid"></div>
        </div>
    </div>

    <div id="settings" class="tab-content">
        <div style="padding: 40px 20px;">
            <h1 class="display-font" style="margin-bottom: 30px;">Settings</h1>
            <div class="menu-item" onclick="toggleTheme()">
                <i data-lucide="moon"></i> Dark Mode
                <div style="margin-left: auto;" id="theme-status">Off</div>
            </div>
            <div class="menu-item" onclick="installApp()" id="install-option" style="display: none;">
                <i data-lucide="download"></i> Download App
                <div style="margin-left: auto; color: var(--primary);">Install</div>
            </div>
            <div class="menu-item" onclick="signOut()" style="color: red; margin-top: 50px; border-top: 1px solid var(--border);">
                <i data-lucide="log-out"></i> Sign Out
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="recipe-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 id="rd-title" class="display-font">Recipe</h2>
                <button class="close-btn" onclick="closeRecipe()"><i data-lucide="x"></i></button>
            </div>
            <img id="rd-img" style="width: 100%; height: 200px; object-fit: cover; border-radius: 12px; margin-bottom: 20px;">
            <p id="rd-desc" class="grey-text" style="margin-bottom: 20px;"></p>
            <h4 class="display-font" style="margin-bottom: 10px;">Instructions</h4>
            <div id="rd-instructions" style="margin-bottom: 30px; font-size: 0.95rem; line-height: 1.6;"></div>
            <button class="btn btn-primary" id="save-recipe-btn" style="width: 100%;"><i data-lucide="heart"></i> Save to Kitchen</button>
        </div>
    </div>

    <div id="hub-modal" class="modal">
        <div class="modal-content" style="height: 85vh; border-radius: 24px; max-width: 450px; right: 30px; left: auto; position: fixed; bottom: 30px; animation: slideUp 0.3s ease;">
            <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 class="display-font">Messenger</h2>
                <button class="close-btn" onclick="closeHub()"><i data-lucide="x"></i></button>
            </div>
            <div id="hub-messages" style="flex-grow: 1; overflow-y: auto; background: var(--light-bg); border-radius: 12px; padding: 15px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px;"></div>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="hub-input" placeholder="Type a message..." style="flex-grow: 1; padding: 14px; border: 1.5px solid var(--border); border-radius: 12px; background: var(--white); color: var(--dark);">
                <button class="btn btn-primary" onclick="sendHubMessage()"><i data-lucide="send"></i></button>
            </div>
        </div>
    </div>
    <style>@keyframes slideUp { from { opacity: 0; transform: translateY(100%); } to { opacity: 1; transform: translateY(0); } }</style>

    <div id="menu-overlay" class="menu-overlay">
        <div style="display: flex; justify-content: flex-end; margin-bottom: 40px;">
            <button class="close-btn" onclick="toggleMenu()"><i data-lucide="x" style="width: 32px; height: 32px;"></i></button>
        </div>
        <div class="menu-item" onclick="showTab('discovery'); toggleMenu()"><i data-lucide="search"></i>Discovery</div>
        <div class="menu-item" onclick="openHub(); toggleMenu()"><i data-lucide="message-square"></i>Messenger</div>
        <div class="menu-item" onclick="showTab('map'); toggleMenu()"><i data-lucide="map"></i>Map</div>
        <div class="menu-item" onclick="showTab('profile'); toggleMenu()"><i data-lucide="user"></i>Profile</div>
        <div class="menu-item" onclick="showTab('settings'); toggleMenu()"><i data-lucide="settings"></i>Settings</div>
        <div class="menu-item" onclick="signOut()"><i data-lucide="log-out"></i>Sign Out</div>
    </div>

    <script>
        const sb = supabase.createClient('https://sktpjacowqaedddtrhuz.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNrdHBqYWNvd3FhZWRkZHRyaHV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NDk5MzEsImV4cCI6MjA5NDIyNTkzMX0.FK4N_ATFTaUuGXrYu_7OBn3qCdlo0rOzxk-E6TxJxqs');
        let allRecipes = [], mapInitialized = false, currentFacingMode = 'environment', stream = null, deferredPrompt = null;

        async function loadData() {
            const { data: { user } } = await sb.auth.getUser();
            if(!user) { window.location.href = '/login/'; return; }

            const { data: recipes } = await sb.from('recipes').select('*').eq('is_published', true);
            allRecipes = recipes || [];
            renderRecipes(allRecipes);

            const { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single();
            if(profile) {
                document.getElementById('p-name').value = profile.full_name || '';
                document.getElementById('p-handle').innerText = `@${profile.username || 'keeper'}`;
                document.getElementById('p-bio').value = profile.bio || '';
                document.getElementById('p-avatar').src = profile.avatar_url || 'https://via.placeholder.com/100';
                document.getElementById('stat-followers').innerText = profile.followers_count || 0;
                document.getElementById('stat-following').innerText = profile.following_count || 0;
            }
            const { count } = await sb.from('recipes').select('*', { count: 'exact', head: true }).eq('author_id', user.id);
            document.getElementById('stat-recipes').innerText = count || 0;

            if(localStorage.getItem('theme') === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.getElementById('theme-status').innerText = 'On';
            }
            lucide.createIcons();
            loadKitchen();
        }

        async function saveFullProfile() {
            const { data: { user } } = await sb.auth.getUser();
            const name = document.getElementById('p-name').value;
            const bio = document.getElementById('p-bio').value;
            const btn = document.getElementById('save-profile-btn');
            btn.innerText = 'Saving...';
            const { error } = await sb.from('profiles').update({ full_name: name, bio }).eq('id', user.id);
            if(!error) { alert('Sovereign Hub Synced to Supabase!'); btn.innerText = 'Save Profile'; }
        }

        async function saveRecipe(recipeId) {
            const { data: { user } } = await sb.auth.getUser();
            const { error } = await sb.from('saved_recipes').upsert({ user_id: user.id, recipe_id: recipeId });
            if(!error) { alert('Added to Kitchen Inventory!'); loadKitchen(); }
            else { alert('Already in Kitchen.'); }
        }

        async function loadKitchen() {
            const { data: { user } } = await sb.auth.getUser();
            const { data: saved } = await sb.from('saved_recipes').select('recipe_id').eq('user_id', user.id);
            const ids = (saved || []).map(s => s.recipe_id);
            if(ids.length > 0) {
                const { data: recipes } = await sb.from('recipes').select('*').in('id', ids);
                const grid = document.getElementById('kitchen-grid');
                grid.innerHTML = (recipes || []).map(r => `
                    <div class="recipe-card" onclick="openRecipe('${r.id}')">
                        <div class="recipe-image" style="background-image: url(${r.cover_photo_url || ''})"></div>
                        <div class="recipe-info"><h3>${r.title}</h3></div>
                    </div>
                `).join('');
            }
        }

        function renderRecipes(list) {
            const grid = document.getElementById('discovery-grid');
            grid.innerHTML = list.map(r => `
                <div class="recipe-card" onclick="openRecipe('${r.id}')">
                    <div class="recipe-image" style="background-image: url(${r.cover_photo_url || ''})"></div>
                    <div class="recipe-info">
                        <h3>${r.title}</h3>
                        <span class="tag">${(r.vibe_tags || []).join(' • ')}</span>
                    </div>
                </div>
            `).join('');
        }

        function openRecipe(id) {
            const r = allRecipes.find(x => x.id === id);
            if(!r) return;
            document.getElementById('rd-title').innerText = r.title;
            document.getElementById('rd-desc').innerText = r.description;
            document.getElementById('rd-img').src = r.cover_photo_url || '';
            document.getElementById('rd-instructions').innerHTML = `<ol style="padding-left: 20px;">${(r.instructions || []).map(i => `<li style="margin-bottom: 8px;">${i}</li>`).join('')}</ol>`;
            document.getElementById('save-recipe-btn').onclick = () => saveRecipe(id);
            document.getElementById('recipe-modal').style.display = 'flex';
            lucide.createIcons();
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll(`.pill[onclick*="${id}"]`).forEach(p => p.classList.add('active'));
            if(id === 'map' && !mapInitialized) {
                setTimeout(() => {
                    const map = L.map('map-container').setView([10.6918, -61.2225], 10);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                    mapInitialized = true;
                }, 200);
            }
        }

        async function uploadAvatar(el) {
            const file = el.files[0];
            const { data: { user } } = await sb.auth.getUser();
            const path = `avatars/${user.id}_${Date.now()}.png`;
            const { error } = await sb.storage.from('heritage-media').upload(path, file);
            if(!error) {
                const { data: { publicUrl } } = sb.storage.from('heritage-media').getPublicUrl(path);
                await sb.from('profiles').update({ avatar_url: publicUrl }).eq('id', user.id);
                document.getElementById('p-avatar').src = publicUrl;
            }
        }

        function toggleTheme() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const next = isDark ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            document.getElementById('theme-status').innerText = next === 'dark' ? 'On' : 'Off';
        }

        function toggleMenu() {
            const menu = document.getElementById('menu-overlay');
            menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
        }
        function openHub() { document.getElementById('hub-modal').style.display = 'flex'; }
        function closeHub() { document.getElementById('hub-modal').style.display = 'none'; }
        function closeRecipe() { document.getElementById('recipe-modal').style.display = 'none'; }
        function signOut() { sb.auth.signOut(); window.location.href = '/login/'; }

        window.onload = loadData;
    </script>
</body>
</html>
