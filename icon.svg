<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="zapia_gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <filter id="icon_glow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feFlood flood-color="#F97316" flood-opacity="0.4"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="400" height="400" rx="90" fill="#050505"/>
  
  <g transform="translate(200, 200) rotate(45) translate(-120, -150)" filter="url(#icon_glow)">
    <!-- THE ZAPIA-DNA CALALLOO LEAF -->
    
    <!-- Part 1: The Inside Fold (Darker, High-end Shadow) -->
    <path d="M120,30 C60,30 20,80 20,160 C20,240 80,280 120,300 L120,30 Z" fill="#8B3D00" opacity="0.9"/>
    
    <!-- Part 2: The Top Wing (Bright, Asymmetrical, Zapia curve) -->
    <path d="M120,30 C190,30 230,100 230,200 C230,280 170,320 120,340 L120,30 Z" fill="url(#zapia_gold)"/>
    
    <!-- Part 3: The Signature Neural Dots (The "Small Dots" you loved) -->
    <circle cx="120" cy="110" r="14" fill="white" opacity="0.85"/>
    <circle cx="120" cy="200" r="17" fill="white"/>
    <circle cx="120" cy="290" r="14" fill="white" opacity="0.85"/>
    
    <!-- Micro-dot connections (The AI feel) -->
    <circle cx="70" cy="160" r="6" fill="white" opacity="0.4"/>
    <circle cx="170" cy="180" r="6" fill="white" opacity="0.4"/>
  </g>
</svg>