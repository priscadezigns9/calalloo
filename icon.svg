<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="ai_grad_icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9F1C"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
    <filter id="glow_icon">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur"/>
      <feFlood flood-color="#F97316" result="flood"/>
      <feComposite in="flood" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="64" height="64" rx="14" fill="#050505"/>
  
  <g transform="translate(32, 32) rotate(45) translate(-25, -28)" filter="url(#glow_icon)">
    <path d="M34,28 C36,38 30,50 20,54 C16,55 14,54 14,52 C14,44 10,36 6,30 C4,26 4,18 8,14 C8,14 22,16 24,30" 
          fill="#431407" opacity="0.8"/>
    <path d="M14,8 C6,8 0,16 0,26 C0,38 8,48 18,52 C20,53 22,52 22,50 C22,42 26,34 30,28 C32,24 32,18 28,13 C25,10 20,8 14,8 Z" 
          fill="url(#ai_grad_icon)"/>
    <!-- Neural Nodes -->
    <circle cx="14" cy="15" r="1.5" fill="white" opacity="0.8"/>
    <circle cx="18" cy="30" r="2" fill="white" opacity="0.9"/>
    <circle cx="22" cy="45" r="1.5" fill="white" opacity="0.8"/>
    <path d="M14,15 L18,30 L22,45" stroke="white" stroke-width="1" fill="none" opacity="0.4" stroke-dasharray="2,2"/>
  </g>
</svg>