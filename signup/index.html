<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Calalloo</title>
    <link rel="icon" type="image/png" href="https://drive.google.com/uc?export=view&id=1MOdc4fha-Guqo1X3Y8l9JdlBuMdDuuzB">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,700;9..144,0,900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #E87722; --dark: #000; --bg: #FFFFFF; --font-display: 'Fraunces', serif; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--dark); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .auth-card { background: white; width: 100%; max-width: 450px; padding: 48px; border-radius: 40px; border: 1px solid #f0f0f0; box-shadow: 0 20px 50px rgba(0,0,0,0.05); text-align: center; }
        .brand-logo { height: 60px; margin-bottom: 32px; }
        h1 { font-family: var(--font-display); font-size: 32px; margin-bottom: 12px; }
        p { color: #666; font-size: 14px; margin-bottom: 32px; font-weight: 500; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--primary); margin-bottom: 8px; letter-spacing: 1px; }
        input { width: 100%; padding: 16px 20px; border-radius: 16px; border: 2px solid #f0f0f0; background: #f8f9fa; font-weight: 600; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); background: white; }
        .btn-auth { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 100px; width: 100%; font-weight: 800; font-size: 16px; cursor: pointer; margin-top: 12px; transition: 0.3s; }
        .btn-auth:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(232, 119, 34, 0.2); }
        .footer-link { margin-top: 32px; font-size: 13px; font-weight: 600; color: #666; }
        .footer-link a { color: var(--primary); text-decoration: none; font-weight: 800; }
        #error-msg { color: #d00; font-size: 12px; margin-top: 16px; font-weight: 700; }
    </style>
</head>
<body>
    <div class="auth-card">
        <img src="/assets/logo.png" class="brand-logo" alt="Calalloo">
        <h1>Join the Heritage</h1>
        <p>Start your journey as a Heritage Keeper.</p>
        
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="name@example.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Min. 8 characters">
        </div>
        
        <button class="btn-auth" onclick="signUp()">Create Account</button>
        <div id="error-msg"></div>

        <div class="footer-link">
            Already a member? <a href="/login/">Sign In</a>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://sktpjacowqaedddtrhuz.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ChdrHQEJV7pVpJMKt-ZaUw_6V0WRKAR';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function signUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.querySelector('.btn-auth');
            const err = document.getElementById('error-msg');
            
            btn.innerText = "Processing...";
            err.innerText = "";

            const { data, error } = await sb.auth.signUp({ email, password });
            
            if (error) {
                err.innerText = error.message;
                btn.innerText = "Create Account";
            } else {
                btn.innerText = "Success! Check Email";
                btn.style.background = "#2D5A27";
                setTimeout(() => { window.location.href = '/login/'; }, 2000);
            }
        }
    </script>
</body>
</html>
