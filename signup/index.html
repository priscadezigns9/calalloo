<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration | Calalloo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,700;9..144,0,900;9..144,1,900&family=Inter:wght@400;600;800&family=Space+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #FFF8F0;
            --primary: #E87722;
            --dark: #1A0D00;
            --mid: #6B5E4F;
            --white: #FFFFFF;
            --border: rgba(26, 13, 0, 0.08);
            --font-display: 'Fraunces', serif;
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'Space Mono', monospace;
            --glow: rgba(232, 119, 34, 0.4);
        }

        [data-theme="dark"] {
            --bg: #0A0A0B;
            --dark: #FFFFFF;
            --mid: #A1A1A6;
            --white: #141416;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg); 
            background-image: radial-gradient(var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            color: var(--dark); 
            font-family: var(--font-sans); 
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            -webkit-font-smoothing: antialiased; 
            transition: background 0.3s, color 0.3s;
        }

        .auth-card {
            background: var(--white);
            backdrop-filter: blur(25px) saturate(180%);
            padding: 4rem;
            width: 100%;
            max-width: 480px;
            border-radius: 40px;
            border: 1px solid var(--border);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.15);
            position: relative;
        }

        [data-theme="dark"] .auth-card {
            background: rgba(15, 15, 18, 0.9);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
        }

        .auth-card::before {
            content: "NODE_INITIALIZATION";
            position: absolute;
            top: 2rem;
            right: 3rem;
            font-family: var(--font-mono);
            font-size: 0.55rem;
            color: #00FF9D;
            letter-spacing: 0.2em;
        }

        .logo-box { text-align: center; margin-bottom: 3rem; }
        .logo-box img { height: 42px; }

        h1 {
            font-family: var(--font-display);
            font-size: 3rem;
            line-height: 0.9;
            margin-bottom: 2rem;
            text-align: center;
            font-weight: 900;
            letter-spacing: -0.05em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1px;
        }
        h1 span { color: var(--primary); font-size: 4rem; line-height: 0; margin-top: 1.2rem; margin-left: -2px; }

        .form-group { margin-bottom: 1.5rem; position: relative; }
        label { display: block; font-size: 0.65rem; font-weight: 800; color: var(--mid); text-transform: uppercase; margin-bottom: 0.8rem; font-family: var(--font-mono); letter-spacing: 0.1em; }
        input {
            width: 100%;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.03);
            padding: 1.1rem;
            padding-right: 3.5rem;
            border-radius: 12px;
            box-sizing: border-box;
            font-family: var(--font-mono);
            color: white;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        input:focus { outline: none; border-color: var(--primary); background: rgba(232, 119, 34, 0.05); }

        .pass-toggle {
            position: absolute;
            right: 1.2rem;
            bottom: 1rem;
            color: var(--mid);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.3s;
        }
        .pass-toggle:hover { color: var(--primary); }
        .pass-toggle svg { width: 18px; height: 18px; }

        .btn-auth {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 1.2rem;
            font-weight: 800;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-family: var(--font-mono);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 10px 20px var(--glow);
            margin-top: 1rem;
        }
        .btn-auth:hover { transform: translateY(-3px); box-shadow: 0 15px 30px var(--glow); }

        .auth-footer { margin-top: 3rem; text-align: center; font-size: 0.7rem; color: var(--mid); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.1em; }
        .auth-footer a { color: var(--primary); text-decoration: none; font-weight: 800; }
        .auth-footer a:hover { border-bottom: 1px solid var(--primary); }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="logo-box">
            <a href="../index.html"><img src="../assets/logo.png" alt="Calalloo"></a>
        </div>
        <h1>Calalloo<span>.</span></h1>
        <form id="signupForm">
            <div class="form-group">
                <label>Node Designation (Full Name)</label>
                <input type="text" id="fullName" placeholder="SPECIMEN_ALPHA" required>
            </div>
            <div class="form-group">
                <label>Neural ID (Email)</label>
                <input type="email" id="email" placeholder="ident_0x@heritage.lab" required>
            </div>
            <div class="form-group">
                <label>Security Vector (Password)</label>
                <input type="password" id="password" required>
                <div class="pass-toggle" onclick="togglePassword()">
                    <svg class="eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                    <svg class="eye-on" style="display:none;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </div>
            </div>
            <button type="submit" class="btn-auth">Initialize Node</button>
        </form>
        <div class="auth-footer">
            Uplink already active? <a href="../login/">Sign In</a>
        </div>
    </div>

    <script src="../js/backend.js?v=6"></script>
    <script>
        ThemeManager.init();

        function togglePassword() {
            const passInput = document.getElementById('password');
            const eyeOn = document.querySelector('.eye-on');
            const eyeOff = document.querySelector('.eye-off');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeOn.style.display = 'block';
                eyeOff.style.display = 'none';
            } else {
                passInput.type = 'password';
                eyeOn.style.display = 'none';
                eyeOff.style.display = 'block';
            }
        }

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = e.target.querySelector('button');
            
            btn.textContent = "Synthesizing Neural ID...";
            btn.disabled = true;

            try {
                const result = await window.backend.signUp(email, password, fullName);
                if (result.success) {
                    btn.textContent = "Node Initialized. Redirecting...";
                    setTimeout(() => window.location.href = '../dashboard/', 1000);
                } else {
                    alert('System Error: ' + result.error);
                    btn.textContent = "Initialize Node";
                    btn.disabled = false;
                }
            } catch (err) {
                console.error(err);
                btn.textContent = "Critical System Failure.";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
