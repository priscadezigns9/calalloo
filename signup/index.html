<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Calalloo</title>
    <link rel="icon" type="image/png" href="/assets/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,700;9..144,0,900;9..144,1,900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #FFF5EE;
            --primary: #E87722; 
            --text: #4A4A4A;
            --dark-text: #1A0D00;
            --white: #FFFFFF;
            --border: rgba(232, 119, 34, 0.1);
            --font-display: 'Fraunces', serif;
            --font-sans: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: var(--font-sans); 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .signup-card {
            background: var(--white);
            padding: 48px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 440px;
            text-align: center;
        }

        .logo { height: 50px; margin-bottom: 32px; }

        h1 { font-family: var(--font-display); font-size: 32px; color: var(--dark-text); margin-bottom: 12px; }
        p { margin-bottom: 32px; opacity: 0.7; font-weight: 500; }

        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-weight: 800; font-size: 12px; text-transform: uppercase; margin-bottom: 8px; color: var(--primary); }
        
        .input-wrapper { position: relative; width: 100%; }
        input { width: 100%; padding: 16px; padding-right: 50px; border-radius: 12px; border: 2px solid #F0F0F0; outline: none; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: var(--primary); }

        .eye-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #888;
            transition: 0.2s;
            display: flex;
            align-items: center;
        }
        .eye-toggle:hover { color: var(--primary); }

        .btn-signup {
            background: var(--primary);
            color: white;
            padding: 16px;
            border-radius: 12px;
            font-weight: 800;
            width: 100%;
            border: none;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            transition: 0.3s;
        }
        .btn-signup:disabled { opacity: 0.5; cursor: not-allowed; }

        .footer-text { margin-top: 24px; font-size: 14px; }
        .footer-text a { color: var(--primary); text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>
    <div class="signup-card">
        <a href="/"><img src="/assets/logo.png" alt="Calalloo Logo" class="logo"></a>
        <h1>Join the Lab</h1>
        <p>Start preserving your food heritage today.</p>
        
        <form id="signupForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullname" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="name@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" required placeholder="••••••••">
                    <div class="eye-toggle" onclick="togglePassword()">
                        <i data-lucide="eye" id="eyeIcon" style="width: 20px; height: 20px;"></i>
                    </div>
                </div>
            </div>
            <button type="submit" class="btn-signup" id="signupBtn">Create Account</button>
        </form>

        <div class="footer-text">
            Already have an account? <a href="/login/">Sign In</a>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://sktpjacowqaedddtrhuz.supabase.co';
        const SUPABASE_KEY = '{credential:supabase-anon-key}';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        lucide.createIcons();

        function togglePassword() {
            const passInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeIcon.setAttribute('data-lucide', 'eye-off');
            } else {
                passInput.type = 'password';
                eyeIcon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const fullname = document.getElementById('fullname').value;
            const btn = document.getElementById('signupBtn');
            
            btn.innerText = "Creating Account...";
            btn.disabled = true;

            const { data, error } = await sb.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: {
                        full_name: fullname
                    }
                }
            });

            if (error) {
                alert(error.message);
                btn.innerText = "Create Account";
                btn.disabled = false;
            } else {
                alert("Account created! Please check your email for confirmation.");
                window.location.href = '/login/';
            }
        });
    </script>
</body>
</html>
