<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Calalloo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#FF8C00',
                        dark: '#1A1A1A',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #1A1A1A; color: white; }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center justify-center p-6">
    <div class="w-full max-w-md bg-zinc-900 border border-zinc-800 p-8 rounded-2xl shadow-xl">
        <div class="flex flex-col items-center mb-8">
            <h1 class="text-4xl font-bold text-brand italic">Calalloo</h1>
            <p class="text-zinc-400 mt-2">Join the heritage</p>
        </div>

        <form id="signup-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-zinc-400 mb-1">Username</label>
                <input type="text" id="username" required class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-brand transition-colors">
            </div>
            <div>
                <label class="block text-sm font-medium text-zinc-400 mb-1">Email Address</label>
                <input type="email" id="email" required class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-brand transition-colors">
            </div>
            <div>
                <label class="block text-sm font-medium text-zinc-400 mb-1">Password</label>
                <input type="password" id="password" required class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-brand transition-colors">
            </div>
            <div class="pt-4">
                <button type="submit" class="w-full bg-brand hover:bg-orange-600 text-white font-bold py-3 rounded-lg transition-colors shadow-lg">
                    Create Account
                </button>
            </div>
        </form>

        <div class="mt-8 text-center text-zinc-400">
            Already have an account? 
            <a href="/login/" class="text-brand hover:underline">Log in</a>
        </div>
        
        <div id="message" class="mt-4 text-center text-sm hidden"></div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        const supabase = createClient('https://sktpjacowqaedddtrhuz.supabase.co', '{{credential:supabase-callaloo-dpanyard}}')

        const form = document.getElementById('signup-form');
        const message = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            message.classList.remove('hidden', 'text-red-500', 'text-green-500');
            message.innerText = 'Creating account...';

            const { data, error } = await supabase.auth.signUp({
                email,
                password,
                options: {
                    data: { username: username }
                }
            });

            if (error) {
                message.innerText = error.message;
                message.classList.add('text-red-500');
            } else if (data.user) {
                // The profile is usually created via a Supabase Trigger, 
                // but we can try to insert it manually if needed or just redirect.
                // Assuming trigger handles profile creation.
                message.innerText = 'Account created! Redirecting to login...';
                message.classList.add('text-green-500');
                setTimeout(() => window.location.href = '/login/', 2000);
            }
        });
    </script>
</body>
</html>
