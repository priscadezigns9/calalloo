<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Calalloo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,700;9..144,0,900;9..144,1,900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #FFF8F0;
            --primary: #E87722;
            --dark: #1A0D00;
            --mid: #6B5E4F;
            --white: #FFFFFF;
            --border: rgba(232, 119, 34, 0.1);
            --font-display: 'Fraunces', serif;
            --font-sans: 'Inter', sans-serif;
        }

        [data-theme="dark"] {
            --bg: #0A0A0B;
            --dark: #FFFFFF;
            --mid: #A1A1A6;
            --white: #141416;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg); 
            color: var(--dark); 
            font-family: var(--font-sans); 
            line-height: 1.6; 
            padding-bottom: 100px;
        }

        header { 
            padding: 1rem 1.5rem; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: var(--white);
            border-bottom: 1px solid var(--border);
            position: sticky; 
            top: 0; 
            z-index: 1000;
        }

        .nav-brand { font-family: var(--font-display); font-weight: 900; font-size: 1.4rem; color: var(--primary); text-decoration: none; }
        .logo-small { height: 32px; width: 32px; border-radius: 50%; border: 1px solid var(--border); }

        .container { max-width: 600px; margin: 3rem auto; padding: 0 1.5rem; text-align: center; }

        .profile-header { margin-bottom: 3rem; position: relative; display: inline-block; }
        .avatar-container { 
            width: 120px; 
            height: 120px; 
            border-radius: 50%; 
            background: #eee; 
            border: 3px solid var(--primary);
            overflow: hidden;
            margin: 0 auto 1.5rem;
            cursor: pointer;
            position: relative;
        }
        .avatar-container img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-container .upload-hint { 
            position: absolute; 
            bottom: 0; 
            width: 100%; 
            background: rgba(0,0,0,0.5); 
            color: white; 
            font-size: 0.6rem; 
            padding: 4px 0; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }

        h2 { font-family: var(--font-display); font-size: 2rem; font-weight: 900; margin-bottom: 0.5rem; }
        .user-email { color: var(--mid); font-size: 0.9rem; margin-bottom: 2rem; }

        .stats-grid { 
            display: flex; 
            justify-content: center; 
            gap: 3rem; 
            margin-bottom: 3rem; 
            padding: 1.5rem; 
            background: var(--white); 
            border-radius: 24px; 
            border: 1px solid var(--border);
        }
        .stat-item b { display: block; font-size: 1.2rem; color: var(--primary); }
        .stat-item span { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--mid); }

        .action-list { text-align: left; background: var(--white); border-radius: 24px; border: 1px solid var(--border); overflow: hidden; }
        .action-item { 
            padding: 1.2rem 1.5rem; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            text-decoration: none;
            color: var(--dark);
            font-weight: 600;
        }
        .action-item:last-child { border-bottom: none; color: #ff4444; }
        .action-item svg { width: 20px; height: 20px; color: var(--mid); }

        /* Modern Bottom Nav */
        .bottom-nav { 
            position: fixed; 
            bottom: 1.5rem; 
            left: 50%; 
            transform: translateX(-50%); 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(20px); 
            padding: 0.8rem 2rem; 
            border-radius: 100px; 
            display: flex; 
            gap: 3rem; 
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(232, 119, 34, 0.15);
            z-index: 2000;
        }

        .nav-item { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-decoration: none; 
            color: var(--mid);
        }
        .nav-item.active { color: var(--primary); }
        .nav-item svg { width: 24px; height: 24px; margin-bottom: 4px; }
        .nav-item span { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; }
    </style>
</head>
<body>

    <header>
        <a href="../index.html" class="nav-brand">Calalloo</a>
        <img src="../assets/logo.png" class="logo-small" alt="Lab Logo">
    </header>

    <main class="container">
        <div class="profile-header">
            <div class="avatar-container">
                <img src="" alt="" id="userAvatar">
                <div class="upload-hint">Add Photo</div>
            </div>
            <h2 id="userName">Specimen Alpha</h2>
            <p class="user-email" id="userEmail">uplink@calalloo.lab</p>
        </div>

        <div class="stats-grid">
            <div class="stat-item"><b>0</b><span>Scans</span></div>
            <div class="stat-item"><b>0</b><span>Followers</span></div>
            <div class="stat-item"><b>0</b><span>Following</span></div>
        </div>

        <div class="action-list">
            <a href="#" class="action-item"><span>Settings</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></a>
            <a href="#" class="action-item"><span>Saved Heritage</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></a>
            <a href="javascript:supabase.auth.signOut()" class="action-item"><span>Sign Out</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></a>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="../dashboard/" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
            <span>Feed</span>
        </a>
        <a href="../scan/" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
            <span>Scan</span>
        </a>
        <a href="index.html" class="nav-item active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span>Profile</span>
        </a>
    </nav>

    <script src="../js/backend.js"></script>
    <script>
        ThemeManager.init();
        const user = supabase.auth.getUser();
        if(user) {
            document.getElementById('userEmail').innerText = user.email;
            document.getElementById('userName').innerText = user.full_name || "New Member";
        }
    </script>
</body>
</html>
