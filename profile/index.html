<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Calalloo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,700;9..144,0,900;9..144,1,900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #FFF8F0;
            --primary: #E87722;
            --dark: #1A0D00;
            --mid: #6B5E4F;
            --white: #FFFFFF;
            --border: rgba(232, 119, 34, 0.1);
            --font-display: 'Fraunces', serif;
            --font-sans: 'Inter', sans-serif;
            --sun-display: block;
            --moon-display: none;
        }

        [data-theme="dark"] {
            --bg: #0A0A0B;
            --dark: #FFFFFF;
            --mid: #A1A1A6;
            --white: #141416;
            --border: rgba(255, 255, 255, 0.1);
            --sun-display: none;
            --moon-display: block;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg); 
            color: var(--dark); 
            font-family: var(--font-sans); 
            line-height: 1.6; 
            padding-bottom: 100px;
        }

        header { 
            padding: 1rem 1.5rem; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: var(--white);
            border-bottom: 1px solid var(--border);
            position: sticky; 
            top: 0; 
            z-index: 1000;
        }

        .nav-brand span::after { 
            content: ""; 
            width: 6px; 
            height: 6px; 
            background: #000; 
            border-radius: 50%; 
            display: inline-block; 
            margin-top: 10px; 
            transition: background 0.3s;
        }
        [data-theme="dark"] .nav-brand span::after { background: #fff; }

        .header-actions { display: flex; align-items: center; gap: 1.2rem; }
        
        .theme-switch {
            width: 50px;
            height: 26px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 100px;
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 2px;
            transition: all 0.3s;
        }
        .theme-switch .circle {
            width: 20px; height: 20px; background: var(--primary); border-radius: 50%;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        [data-theme="dark"] .theme-switch .circle { transform: translateX(22px); background: #fff; }
        .theme-switch svg { width: 12px; height: 12px; fill: none; stroke: currentColor; stroke-width: 3; display: none; }
        
        /* Modern icon logic */
        [data-theme="light"] .theme-switch .sun { display: block; color: white; }
        [data-theme="dark"] .theme-switch .moon { display: block; color: var(--primary); }

        .logo-small { height: 36px; width: 36px; border-radius: 50%; border: 1px solid var(--border); object-fit: cover; }

        .container { max-width: 600px; margin: 3rem auto; padding: 0 1.5rem; text-align: center; }

        .profile-header { margin-bottom: 3rem; position: relative; display: inline-block; }
        .avatar-container { 
            width: 120px; 
            height: 120px; 
            border-radius: 50%; 
            background: #eee; 
            border: 3px solid var(--primary);
            overflow: hidden;
            margin: 0 auto 1.5rem;
            cursor: pointer;
            position: relative;
        }
        .avatar-container img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-container .upload-hint { 
            position: absolute; 
            bottom: 0; 
            width: 100%; 
            background: rgba(0,0,0,0.5); 
            color: white; 
            font-size: 0.6rem; 
            padding: 4px 0; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }

        h2 { font-family: var(--font-display); font-size: 2rem; font-weight: 900; margin-bottom: 0.5rem; }
        .user-bio { color: var(--mid); font-size: 0.95rem; margin-bottom: 0.2rem; }
        .user-location { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2rem; }

        .stats-grid { 
            display: flex; 
            justify-content: center; 
            gap: 3rem; 
            margin-bottom: 3rem; 
            padding: 1.5rem; 
            background: var(--white); 
            border-radius: 24px; 
            border: 1px solid var(--border);
        }
        .stat-item b { display: block; font-size: 1.2rem; color: var(--primary); }
        .stat-item span { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--mid); }

        .action-list { text-align: left; background: var(--white); border-radius: 24px; border: 1px solid var(--border); overflow: hidden; }
        .action-item { 
            padding: 1.2rem 1.5rem; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            text-decoration: none;
            color: var(--dark);
            font-weight: 600;
            background: none;
            border: none;
            width: 100%;
            cursor: pointer;
            font-family: inherit;
            font-size: 1rem;
        }
        .action-item:last-child { border-bottom: none; color: #ff4444; }
        .action-item svg { width: 20px; height: 20px; color: var(--mid); }

        /* Modern Modal Edit Profile */
        .modal {
            display: none;
            position: fixed;
            z-index: 3000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background-color: var(--white);
            margin: 15% auto;
            padding: 2.5rem;
            border-radius: 32px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            border: 1px solid var(--border);
        }
        .modal h3 { font-family: var(--font-display); font-size: 1.5rem; margin-bottom: 1.5rem; color: var(--primary); }
        .form-group { margin-bottom: 1.5rem; text-align: left; }
        .form-group label { display: block; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-bottom: 0.5rem; color: var(--mid); }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg);
            color: var(--dark);
            font-family: var(--font-sans);
        }
        .modal-actions { display: flex; gap: 1rem; margin-top: 2rem; }
        .btn {
            flex: 1;
            padding: 1rem;
            border-radius: 100px;
            border: none;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.75rem;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: var(--bg); color: var(--mid); }

        /* Modern Bottom Nav */
        .bottom-nav { 
            position: fixed; 
            bottom: 1.5rem; 
            left: 50%; 
            transform: translateX(-50%); 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(20px); 
            padding: 0.8rem 2rem; 
            border-radius: 100px; 
            display: flex; 
            gap: 3rem; 
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(232, 119, 34, 0.15);
            z-index: 2000;
        }

        .nav-item { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-decoration: none; 
            color: var(--mid);
        }
        .nav-item.active { color: var(--primary); }
        .nav-item svg { width: 24px; height: 24px; margin-bottom: 4px; }
        .nav-item span { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; }
    </style>
</head>
<body>

    <header>
        <a href="../index.html" class="nav-brand"><span>Calalloo</span></a>
        
        <div class="header-actions">
            <div class="theme-switch" onclick="ThemeManager.toggle()" title="Toggle Theme">
                <div class="circle">
                    <svg class="sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    <svg class="moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </div>
            </div>
            <a href="index.html"><img src="../assets/logo.png" id="headerAvatar" class="logo-small" alt="Lab Logo"></a>
        </div>
    </header>

    <main class="container">
        <div class="profile-header">
            <div class="avatar-container" onclick="document.getElementById('avatarInput').click()">
                <img src="" alt="" id="userAvatar">
                <div class="upload-hint">Change Photo</div>
                <input type="file" id="avatarInput" style="display: none" accept="image/*">
            </div>
            <h2 id="userName">Specimen Alpha</h2>
            <p class="user-bio" id="userBio">Caribbean Heritage Enthusiast</p>
            <p class="user-location" id="userLocation">Region Uplink: Active</p>
        </div>

        <div class="stats-grid">
            <div class="stat-item"><b id="statScans">0</b><span>Scans</span></div>
            <div class="stat-item"><b id="statFollowers">0</b><span>Followers</span></div>
            <div class="stat-item"><b id="statFollowing">0</b><span>Following</span></div>
        </div>

        <div class="action-list">
            <button onclick="openEditModal()" class="action-item"><span>Edit Profile</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></button>
            <button onclick="openSettings()" class="action-item"><span>Settings</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></button>
            <button onclick="openSaved()" class="action-item"><span>Saved Heritage</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></button>
            <button onclick="supabase.auth.signOut()" class="action-item"><span>Sign Out</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></button>
        </div>
    </main>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>Update Identity</h3>
            <div class="form-group">
                <label>Node Designation</label>
                <input type="text" id="editName">
            </div>
            <div class="form-group">
                <label>Heritage Bio</label>
                <textarea id="editBio" rows="3"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveProfile()">Apply Changes</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="../dashboard/" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
            <span>Feed</span>
        </a>
        <a href="../scan/" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
            <span>Scan</span>
        </a>
        <a href="index.html" class="nav-item active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span>Profile</span>
        </a>
    </nav>

    <script src="../js/backend.js"></script>
    <script>
        ThemeManager.init();
        
        function loadProfile() {
            const user = supabase.auth.getUser();
            if(user) {
                document.getElementById('userName').innerText = user.full_name || "Specimen Alpha";
                document.getElementById('userBio').innerText = user.bio || "Caribbean Heritage Enthusiast";
                if(user.avatar_url) {
                    document.getElementById('userAvatar').src = user.avatar_url;
                    document.getElementById('headerAvatar').src = user.avatar_url;
                }
                document.getElementById('statScans').innerText = user.scans || 0;
                document.getElementById('statFollowers').innerText = user.followers || 0;
                document.getElementById('statFollowing').innerText = user.following || 0;
            }
        }

        document.getElementById('avatarInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const url = event.target.result;
                    supabase.auth.updateUser({ avatar_url: url });
                    loadProfile();
                };
                reader.readAsDataURL(file);
            }
        });

        function openEditModal() {
            document.getElementById('editName').value = document.getElementById('userName').innerText;
            document.getElementById('editBio').value = document.getElementById('userBio').innerText;
            document.getElementById('editModal').style.display = 'block';
        }

        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        function saveProfile() {
            const name = document.getElementById('editName').value;
            const bio = document.getElementById('editBio').value;
            supabase.auth.updateUser({ full_name: name, bio: bio });
            loadProfile();
            closeEditModal();
        }

        function openSettings() {
            const subject = encodeURIComponent("Support Request: Calalloo Node");
            window.location.href = `mailto:agency@priscadesigns.org?subject=${subject}`;
        }

        function openSaved() {
            alert("Saved Heritage: No specimens logged yet.");
        }

        loadProfile();
        // Live Stat Polling (Simulated for Demo)
        setInterval(() => {
            const user = supabase.auth.getUser();
            if(user) {
                const statScans = document.getElementById('statScans');
                const statFollowers = document.getElementById('statFollowers');
                const statFollowing = document.getElementById('statFollowing');
                if(statScans) statScans.innerText = user.scans || 0;
                if(statFollowers) statFollowers.innerText = user.followers || 0;
                if(statFollowing) statFollowing.innerText = user.following || 0;
            }
        }, 5000);
    </script>
</body>
</html>
