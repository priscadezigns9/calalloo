<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heritage Scan | Calalloo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,700;9..144,0,900;9..144,1,900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #FFF8F0;
            --primary: #E87722;
            --dark: #1A0D00;
            --mid: #6B5E4F;
            --white: #FFFFFF;
            --border: rgba(232, 119, 34, 0.1);
            --font-display: 'Fraunces', serif;
            --font-sans: 'Inter', sans-serif;
        }

        [data-theme="dark"] {
            --bg: #0A0A0B;
            --dark: #FFFFFF;
            --mid: #A1A1A6;
            --white: #141416;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg); 
            color: var(--dark); 
            font-family: var(--font-sans); 
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header { 
            padding: 1rem 1.5rem; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: var(--white);
            border-bottom: 1px solid var(--border);
        }

        .nav-brand { font-family: var(--font-display); font-weight: 900; font-size: 1.4rem; color: var(--primary); text-decoration: none; }
        
        .camera-view {
            flex: 1;
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .scan-overlay {
            position: absolute;
            width: 250px;
            height: 250px;
            border: 2px solid var(--primary);
            border-radius: 40px;
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.5);
            z-index: 5;
        }

        .scan-overlay::before {
            content: "";
            position: absolute;
            top: -10px; left: -10px; width: 40px; height: 40px;
            border-top: 4px solid #fff; border-left: 4px solid #fff;
            border-radius: 10px 0 0 0;
        }

        .scan-ui {
            position: absolute;
            bottom: 4rem;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            z-index: 10;
        }

        .shutter {
            width: 80px;
            height: 80px;
            background: #fff;
            border-radius: 50%;
            border: 6px solid rgba(232, 119, 34, 0.3);
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .shutter:active { transform: scale(0.9); }
        .shutter-file { position: absolute; opacity: 0; width: 80px; height: 80px; cursor: pointer; }

        /* Modern Bottom Nav */
        .bottom-nav { 
            background: var(--white);
            padding: 0.8rem 2rem; 
            display: flex; 
            justify-content: space-around;
            border-top: 1px solid var(--border);
            z-index: 2000;
        }

        .nav-item { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-decoration: none; 
            color: var(--mid);
        }
        .nav-item.active { color: var(--primary); }
        .nav-item svg { width: 24px; height: 24px; margin-bottom: 4px; }
        .nav-item span { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; }

        .scan-text {
            position: absolute;
            top: 2rem;
            width: 100%;
            text-align: center;
            color: white;
            font-family: var(--font-display);
            font-size: 1.2rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <header>
        <a href="../index.html" class="nav-brand">Calalloo</a>
        <img src="../assets/logo.png" style="height:32px; border-radius:50%;" alt="Lab Logo">
    </header>

    <main class="camera-view">
        <div class="scan-text">Capture heritage specimen...</div>
        <div class="scan-overlay"></div>
        
        <div class="scan-ui">
            <div class="shutter">
                <input type="file" id="cameraInput" class="shutter-file" accept="image/*" capture="environment">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="../dashboard/" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
            <span>Feed</span>
        </a>
        <a href="index.html" class="nav-item active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
            <span>Scan</span>
        </a>
        <a href="../profile/" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span>Profile</span>
        </a>
    </nav>

    <script src="../js/backend.js"></script>
    <script>ThemeManager.init();</script>
</body>
</html>
