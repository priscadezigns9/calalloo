<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calalloo | The Caribbean Food Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,700;9..144,0,900;9..144,1,900&family=Inter:wght@400;600;800&family=Space+Mono&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    
    <!-- Real Map Library -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg: #FAFAFA;
            --primary: #E87722;
            --calalloo-green: #2D5A27;
            --dark: #1A0D00;
            --white: #FFFFFF;
            --font-display: 'Fraunces', serif;
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'Space Mono', monospace;
        }

        body.dark-mode { --bg: #0B0E14; --dark: #F8FAFC; --white: #1A1F26; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--dark); font-family: var(--font-sans); transition: 0.3s; }

        header {
            padding: 1rem 5%;
            background: var(--white);
            border-bottom: 2px solid var(--calalloo-green);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-brand {
            font-family: var(--font-display);
            font-weight: 900;
            font-size: 1.8rem;
            color: var(--calalloo-green);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .layout { display: flex; height: calc(100vh - 72px); }
        
        .sidebar {
            width: 350px;
            background: var(--white);
            border-right: 1px solid rgba(0,0,0,0.05);
            padding: 30px 20px;
            overflow-y: auto;
        }

        .sidebar h2 { font-family: var(--font-display); font-size: 1.1rem; margin-bottom: 20px; color: var(--calalloo-green); }

        .taste-profile-box { background: linear-gradient(135deg, var(--calalloo-green), #1a3617); border-radius: 20px; padding: 25px; color: white; margin-bottom: 30px; }
        .taste-profile-box h2 { font-family: var(--font-display); font-size: 1.2rem; margin-bottom: 10px; color: white !important; }

        .main { flex: 1; padding: 40px 5%; overflow-y: auto; position: relative; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Universal Search UI */
        .universal-search-hub { position: relative; width: 100%; margin-bottom: 40px; }
        .search-input { width: 100%; padding: 1.5rem 3.5rem; border-radius: 100px; border: 3.5px solid var(--calalloo-green); font-size: 1.2rem; font-family: var(--font-sans); outline: none; box-shadow: 0 20px 60px rgba(45, 90, 39, 0.12); background: var(--white); color: var(--dark); font-weight: 700; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .pin { background: var(--white); border-radius: 28px; overflow: hidden; box-shadow: 0 4px 25px rgba(0,0,0,0.04); transition: 0.3s; border: 1px solid rgba(0,0,0,0.02); display: flex; flex-direction: column; }
        .pin:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(45, 90, 39, 0.1); }
        .pin img { width: 100%; height: 260px; object-fit: cover; }
        .pin-content { padding: 1.5rem; flex: 1; }
        .pin-content h3 { font-family: var(--font-display); font-size: 1.4rem; margin-bottom: 8px; color: var(--calalloo-green); }
        .pin-tag { font-family: var(--font-mono); font-size: 0.75rem; color: var(--primary); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 800; }

        .map-container { width: 100%; height: 650px; border-radius: 32px; border: 1px solid rgba(0,0,0,0.1); }
        .ai-marker { background: var(--primary); border: 2px solid white; border-radius: 50%; box-shadow: 0 0 15px rgba(232, 119, 34, 0.5); display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; }
    </style>
</head>
<body>

<header>
    <a href="/index.html" class="nav-brand">Calalloo <span style="font-size:10px; background:var(--primary); color:white; padding:2px 8px; border-radius:50px;">v2.0 AI</span></a>
    <nav style="display: flex; gap: 20px; align-items: center;">
        <a href="javascript:void(0)" onclick="showMainTab('feed')" style="text-decoration:none; font-weight:800; color:var(--dark); font-size:14px;">Culinary Feed</a>
        <a href="javascript:void(0)" onclick="showMainTab('map-tab')" style="text-decoration:none; font-weight:800; color:var(--dark); font-size:14px;">Discovery Map</a>
        <a href="/profile/index.html" style="text-decoration:none; font-weight:800; color:var(--dark); font-size:14px;">My Kitchen</a>
    </nav>
</header>

<div class="layout">
    <aside class="sidebar">
        <div class="taste-profile-box">
            <h2>✨ AI Taste Profile</h2>
            <p id="ai-status" style="font-size:12px; opacity:0.9;">Analyzing 10,000+ nodes in Trinidad...</p>
        </div>
        
        <h2>Smart Follows</h2>
        <div id="smart-follows" style="display:grid; gap:15px;"></div>
    </aside>

    <main class="main">
        <div id="feed" class="tab-content active">
            <div class="universal-search-hub">
                <input type="text" class="search-input" id="omni-search" placeholder="Search the Empire for dishes, people, or markets..." oninput="vectorSearch(this.value)">
            </div>
            
            <h2 style="font-family: var(--font-display); margin-bottom: 24px;">Recommended for Your Node</h2>
            <div class="grid" id="recipe-grid"></div>
        </div>

        <div id="map-tab" class="tab-content">
            <h1 style="font-family: var(--font-display); margin-bottom: 10px;">Geospatial Discovery Hub</h1>
            <p style="opacity:0.6; margin-bottom:30px;">AI is highlighting trending people and heritage dishes near your kitchen.</p>
            <div id="map-node" class="map-container"></div>
        </div>
    </main>
</div>

<script>
    // Force Service Worker Update
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then((registration) => {
        registration.onupdatefound = () => {
          const installingWorker = registration.installing;
          if (installingWorker == null) return;
          installingWorker.onstatechange = () => {
            if (installingWorker.state === 'installed') {
              if (navigator.serviceWorker.controller) {
                console.log('New content available; please refresh.');
                window.location.reload();
              }
            }
          };
        };
      });
    }

    const sb = supabase.createClient('https://sktpjacowqaedddtrhuz.supabase.co', '{{credential:supabase-anon-key}}');

    const nodes = [
        { id: 1, type: "DISH", title: "Trinidadian Callaloo Protocol", meta: "Sunday Heritage", img: "https://thisbagogirl.com/wp-content/uploads/2021/04/Tobago-Crab-and-Callaloo-Recipe-scaled.jpg", lat: 10.65, lng: -61.5, icon: "🍲" },
        { id: 2, type: "DISH", title: "Heritage Chicken Pelau", meta: "One Pot Classic", img: "https://cookingwithria.com/wp-content/uploads/2013/02/IMG_1024-scaled.jpg", lat: 10.6, lng: -61.4, icon: "🍛" },
        { id: 3, type: "PERSON", title: "Priscilla Narine", meta: "AI Architect • Verified", lat: 10.68, lng: -61.51, icon: "👤" },
        { id: 4, type: "PERSON", title: "Marcus Singh", meta: "Flavor Scout", lat: 10.62, lng: -61.45, icon: "👤" }
    ];

    function vectorSearch(q) {
        const query = q.toLowerCase();
        const results = nodes.filter(n => n.title.toLowerCase().includes(query) || n.meta.toLowerCase().includes(query));
        renderFeed(results);
    }

    function renderFeed(data = nodes) {
        const grid = document.getElementById('recipe-grid');
        if(!grid) return;
        grid.innerHTML = data.filter(n => n.type === "DISH").map(n => `
            <div class="pin">
                <img src="${n.img}" alt="${n.title}">
                <div class="pin-content">
                    <span class="pin-tag">${n.meta}</span>
                    <h3>${n.title}</h3>
                    <button onclick="focusOnMap(${n.lat}, ${n.lng})" style="background:none; border:1px solid var(--calalloo-green); color:var(--calalloo-green); padding:8px 16px; border-radius:50px; font-weight:800; font-size:12px; margin-top:15px; cursor:pointer;">Locate Ingredients</button>
                </div>
            </div>
        `).join('');

        const follows = document.getElementById('smart-follows');
        if(!follows) return;
        follows.innerHTML = data.filter(n => n.type === "PERSON").map(p => `
            <div style="background:var(--white); padding:20px; border-radius:20px; border:1px solid rgba(0,0,0,0.05); display:flex; align-items:center; gap:12px;">
                <div style="width:40px; height:40px; background:var(--calalloo-green); color:white; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:800;">${p.title[0]}</div>
                <div>
                    <b style="font-size:14px;">${p.title}</b><br>
                    <small style="color:var(--mid); font-size:11px;">${p.meta}</small>
                </div>
                <button style="margin-left:auto; background:var(--calalloo-green); color:white; border:none; padding:5px 12px; border-radius:50px; font-size:10px; font-weight:800; cursor:pointer;">FOLLOW</button>
            </div>
        `).join('');
    }

    function showMainTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'map-tab') setTimeout(initMap, 200);
    }

    let map;
    function initMap() {
        if(map) return;
        map = L.map('map-node').setView([10.66, -61.51], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        nodes.forEach(n => {
            L.marker([n.lat, n.lng], {
                icon: L.divIcon({ 
                    className: 'ai-marker', 
                    html: `<div style="width:30px; height:30px; display:flex; align-items:center; justify-content:center;">${n.icon}</div>`,
                    iconSize: [30, 30]
                })
            }).addTo(map).bindPopup(`<b>${n.title}</b><br>${n.meta}`);
        });
    }

    function focusOnMap(lat, lng) {
        showMainTab('map-tab');
        if(map) map.setView([lat, lng], 15);
    }

    window.onload = () => { renderFeed(); };
</script>
</body>
</html>
