<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calalloo | The Caribbean Food Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,700;9..144,0,900;9..144,1,900&family=Inter:wght@400;600;800&family=Space+Mono&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #FAFAFA;
            --primary: #E87722;
            --calalloo-green: #2D5A27;
            --dark: #1A0D00;
            --white: #FFFFFF;
            --font-display: 'Fraunces', serif;
            --font-sans: 'Inter', sans-serif;
        }
        body.dark-mode { --bg: #0B0E14; --dark: #F8FAFC; --white: #1A1F26; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--dark); font-family: var(--font-sans); }
        header { padding: 1rem 5%; background: var(--white); border-bottom: 2px solid var(--calalloo-green); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .nav-brand { font-family: var(--font-display); font-weight: 900; font-size: 1.8rem; color: var(--calalloo-green); text-decoration: none; }
        .layout { display: flex; height: calc(100vh - 72px); }
        .sidebar { width: 350px; background: var(--white); border-right: 1px solid rgba(0,0,0,0.05); padding: 30px 20px; overflow-y: auto; }
        .main { flex: 1; padding: 40px 5%; overflow-y: auto; position: relative; }
        .universal-search-hub { position: relative; width: 100%; margin-bottom: 30px; }
        .search-input { width: 100%; padding: 1.5rem 3.5rem; border-radius: 100px; border: 3px solid var(--calalloo-green); font-size: 1.2rem; outline: none; box-shadow: 0 20px 60px rgba(45, 90, 39, 0.12); background: var(--white); color: var(--dark); font-weight: 700; }
        .discovery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .node-card { background: var(--white); border-radius: 24px; padding: 25px; border: 1px solid rgba(0,0,0,0.05); transition: 0.4s; cursor: pointer; }
        .taste-profile-box { background: linear-gradient(135deg, var(--calalloo-green), #1a3617); border-radius: 20px; padding: 25px; color: white; margin-bottom: 30px; }
        .map-container { width: 100%; height: 600px; border-radius: 32px; margin-top: 30px; border: 1px solid rgba(0,0,0,0.1); }
        .ai-marker { background: var(--primary); border: 2px solid white; border-radius: 50%; box-shadow: 0 0 10px rgba(232, 119, 34, 0.5); }
    </style>
</head>
<body>
<header>
    <a href="/index.html" class="nav-brand">Calalloo</a>
    <nav style="display: flex; gap: 20px; align-items: center;">
        <a href="javascript:void(0)" onclick="showMainTab('feed')" style="text-decoration:none; font-weight:800; color:var(--dark); font-size:14px;">Culinary Feed</a>
        <a href="javascript:void(0)" onclick="showMainTab('map-tab')" style="text-decoration:none; font-weight:800; color:var(--dark); font-size:14px;">Discovery Map</a>
        <a href="/profile/index.html" style="text-decoration:none; font-weight:800; color:var(--dark); font-size:14px;">My Kitchen</a>
    </nav>
</header>
<div class="layout">
    <aside class="sidebar">
        <div class="taste-profile-box">
            <h2>✨ AI Taste Profile</h2>
            <p id="ai-status">Vectorizing preferences...</p>
        </div>
        <h3 style="font-size:14px; margin-bottom:15px; color:var(--calalloo-green);">SMART RECOMMENDATIONS</h3>
        <div id="ai-suggestions" style="display:grid; gap:15px;"></div>
    </aside>
    <main class="main">
        <div id="feed" class="tab-content">
            <div class="universal-search-hub">
                <input type="text" class="search-input" id="omni-search" placeholder="Search the Empire for people or dishes..." oninput="vectorSearch(this.value)">
            </div>
            <div class="discovery-grid" id="discovery-grid"></div>
        </div>
        <div id="map-tab" class="tab-content" style="display:none;">
            <h1 style="font-family:var(--font-display); font-size:1.8rem; margin-bottom:10px;">Geospatial Discovery Hub</h1>
            <p style="opacity:0.6; font-size:14px;">AI is highlighting trending people and heritage dishes near your node.</p>
            <div id="map-node" class="map-container"></div>
        </div>
    </main>
</div>
<script>
    const sb = supabase.createClient('https://sktpjacowqaedddtrhuz.supabase.co', '{{credential:supabase-anon-key}}');
    
    const nodes = [
        { type: "DISH", title: "Trinidadian Callaloo Protocol", meta: "Sunday Heritage", lat: 10.65, lng: -61.5, icon: "🍲" },
        { type: "DISH", title: "Heritage Chicken Pelau", meta: "One Pot Classic", lat: 10.6, lng: -61.4, icon: "🍛" },
        { type: "PERSON", title: "Priscilla Narine", meta: "AI Architect", lat: 10.68, lng: -61.51, icon: "👤" },
        { type: "PERSON", title: "Marcus Singh", meta: "Flavor Scout", lat: 10.62, lng: -61.45, icon: "👤" }
    ];

    function vectorSearch(q) {
        const query = q.toLowerCase();
        const results = nodes.filter(n => n.title.toLowerCase().includes(query) || n.meta.toLowerCase().includes(query));
        renderNodes(results);
    }

    function renderNodes(data = nodes) {
        document.getElementById('discovery-grid').innerHTML = data.map(n => `
            <div class="node-card" onclick="focusOnMap(${n.lat}, ${n.lng})">
                <span style="font-size:10px; font-weight:800; color:var(--primary);">${n.type}</span>
                <h3>${n.title}</h3>
                <p style="font-size:13px; opacity:0.7;">${n.meta}</p>
            </div>
        `).join('');
    }

    function renderAISuggestions() {
        const container = document.getElementById('ai-suggestions');
        container.innerHTML = nodes.slice(2,4).map(p => `
            <div style="background:var(--white); padding:15px; border-radius:15px; border:1px solid rgba(0,0,0,0.05);">
                <b style="font-size:14px;">Follow ${p.title}</b><br>
                <small style="color:var(--mid); font-size:11px;">Matches your Heritage profile</small>
            </div>
        `).join('');
        document.getElementById('ai-status').innerText = "Analyzing nodes in Trinidad & Tobago...";
    }

    function showMainTab(id) {
        document.getElementById('feed').style.display = id === 'feed' ? 'block' : 'none';
        document.getElementById('map-tab').style.display = id === 'map-tab' ? 'block' : 'none';
        if(id === 'map-tab') setTimeout(initMap, 200);
    }

    let map;
    let markers = [];
    function initMap() {
        if(map) return;
        const userLat = 10.66; const userLng = -61.51;
        map = L.map('map-node').setView([userLat, userLng], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        nodes.forEach(n => {
            const marker = L.marker([n.lat, n.lng], {
                icon: L.divIcon({ 
                    className: 'ai-marker', 
                    html: `<div style="display:flex; align-items:center; justify-content:center; width:30px; height:30px; font-size:16px;">${n.icon}</div>`,
                    iconSize: [30, 30]
                })
            }).addTo(map).bindPopup(`<b>${n.title}</b><br>${n.meta}`);
            markers.push(marker);
        });
    }

    function focusOnMap(lat, lng) {
        showMainTab('map-tab');
        if(map) map.setView([lat, lng], 15);
    }

    window.onload = () => { renderNodes(); renderAISuggestions(); };
</script>
</body>
</html>
